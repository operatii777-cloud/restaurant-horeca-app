<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapoarte Personal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; padding: 20px; }
        .report-card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h1 class="mb-4"><i class="fas fa-users me-2 text-info"></i>Rapoarte Personal</h1>
        
        <div class="report-card">
            <h5>Vânzări per Ospătar (Luna Curentă)</h5>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead><tr><th>Ospătar</th><th>Nr. Comenzi</th><th>Total Vânzări</th><th>Medie/Comandă</th></tr></thead>
                    <tbody id="staffTable">
                        <tr><td colspan="4" class="text-center">Se încarcă...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        async function loadStaffReport() {
            try {
                const endDate = new Date().toISOString().split('T')[0];
                const startDate = new Date();
                startDate.setMonth(startDate.getMonth() - 1);
                const start = startDate.toISOString().split('T')[0];
                
                const res = await fetch(`/api/orders?startDate=${start}&endDate=${endDate}&limit=1000`);
                const data = await res.json();
                
                if (data.success && data.data) {
                    // Group by waiter
                    const byWaiter = {};
                    data.data.forEach(order => {
                        const waiter = order.waiter_name || 'Necunoscut';
                        if (!byWaiter[waiter]) {
                            byWaiter[waiter] = { count: 0, total: 0 };
                        }
                        byWaiter[waiter].count++;
                        byWaiter[waiter].total += parseFloat(order.total_price) || 0;
                    });
                    
                    const tbody = document.getElementById('staffTable');
                    tbody.innerHTML = Object.entries(byWaiter).map(([waiter, stats]) => `
                        <tr>
                            <td><strong>${waiter}</strong></td>
                            <td>${stats.count}</td>
                            <td>${stats.total.toFixed(2)} RON</td>
                            <td>${(stats.total / stats.count).toFixed(2)} RON</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadStaffReport);
    </script>
</body>
</html>
