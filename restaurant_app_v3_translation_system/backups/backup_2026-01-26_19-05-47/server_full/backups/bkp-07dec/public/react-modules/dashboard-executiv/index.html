<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Executiv</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; padding: 20px; }
        .exec-card { background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .kpi-big { font-size: 3rem; font-weight: 700; line-height: 1; }
        .trend-up { color: #28a745; }
        .trend-down { color: #dc3545; }
        .chart-container { position: relative; height: 300px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h1 class="mb-4"><i class="fas fa-chart-line me-2 text-primary"></i>Dashboard Executiv</h1>
        
        <div class="row">
            <div class="col-md-3">
                <div class="exec-card text-center">
                    <div class="text-muted small mb-2">VENITURI TOTALE (LUNĂ)</div>
                    <div class="kpi-big text-primary" id="revenueMonth">0</div>
                    <div class="small mt-2"><span id="revenueTrend"></span></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="exec-card text-center">
                    <div class="text-muted small mb-2">COMENZI TOTALE (LUNĂ)</div>
                    <div class="kpi-big text-success" id="ordersMonth">0</div>
                    <div class="small mt-2"><span id="ordersTrend"></span></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="exec-card text-center">
                    <div class="text-muted small mb-2">VALOARE MEDIE COMANDĂ</div>
                    <div class="kpi-big text-info" id="avgOrder">0</div>
                    <div class="small mt-2">RON</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="exec-card text-center">
                    <div class="text-muted small mb-2">MARJA PROFIT (%)</div>
                    <div class="kpi-big text-warning" id="profitMargin">0</div>
                    <div class="small mt-2">%</div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-8">
                <div class="exec-card">
                    <h5 class="mb-3">Evoluție Venituri (7 Zile)</h5>
                    <div class="chart-container"><canvas id="revenueChart"></canvas></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="exec-card">
                    <h5 class="mb-3">Top 5 Produse</h5>
                    <div id="topProducts">Se încarcă...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadExecutiveDashboard() {
            try {
                // Get revenue stats
                const resRevenue = await fetch('/api/dashboard/metrics');
                const revenue = await resRevenue.json();
                
                if (revenue.todayRevenue !== undefined) {
                    document.getElementById('revenueMonth').textContent = (revenue.todayRevenue * 30).toFixed(0) + ' RON';
                }
                
                // Get orders from last month
                const endDate = new Date().toISOString().split('T')[0];
                const startDate = new Date(Date.now() - 30*24*60*60*1000).toISOString().split('T')[0];
                
                const resOrders = await fetch(`/api/orders?startDate=${startDate}&endDate=${endDate}&limit=1000`);
                const ordersData = await resOrders.json();
                
                if (ordersData.success && ordersData.data) {
                    const orders = ordersData.data;
                    document.getElementById('ordersMonth').textContent = orders.length;
                    
                    // Calculate avg
                    const totalRevenue = orders.reduce((sum, o) => sum + (parseFloat(o.total_price) || 0), 0);
                    const avg = orders.length > 0 ? totalRevenue / orders.length : 0;
                    document.getElementById('avgOrder').textContent = avg.toFixed(0) + ' RON';
                }
                
                console.log('✅ Dashboard Executiv loaded');
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadExecutiveDashboard);
    </script>
</body>
</html>
