<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapoarte Stoc</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; padding: 20px; }
        .stock-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stock-low { background: #fff3cd; border-left: 4px solid #ffc107; }
        .stock-ok { background: #d4edda; border-left: 4px solid #28a745; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h1 class="mb-4"><i class="fas fa-boxes me-2 text-primary"></i>Rapoarte Stoc</h1>
        
        <div class="stock-card">
            <h5>Situație Stocuri</h5>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead><tr><th>Ingredient</th><th>Stoc Curent</th><th>Stoc Minim</th><th>Status</th></tr></thead>
                    <tbody id="stockTable"><tr><td colspan="4" class="text-center">Se încarcă...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        async function loadStockReport() {
            try {
                const res = await fetch('/api/ingredients');
                const data = await res.json();
                
                if (data.success) {
                    const tbody = document.getElementById('stockTable');
                    tbody.innerHTML = data.data.map(ing => {
                        const isLow = ing.current_stock < ing.min_stock;
                        return `
                            <tr class="${isLow ? 'table-warning' : ''}">
                                <td>${ing.name}</td>
                                <td><strong>${ing.current_stock || 0}</strong> ${ing.unit}</td>
                                <td>${ing.min_stock || 0} ${ing.unit}</td>
                                <td>${isLow ? '<span class="badge bg-warning">STOC SCĂZUT</span>' : '<span class="badge bg-success">OK</span>'}</td>
                            </tr>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadStockReport);
    </script>
</body>
</html>
