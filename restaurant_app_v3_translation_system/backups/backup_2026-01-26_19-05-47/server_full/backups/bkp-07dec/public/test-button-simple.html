<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Test Simplu - Buton Teme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .test-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .btn-test {
            background: #667eea;
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: all 0.3s;
        }
        
        .btn-test:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .status {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #667eea;
        }
        
        .status h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .log {
            background: #1a1a1a;
            color: #00ff00;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin: 10px 0;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .close-btn {
            float: right;
            font-size: 28px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
            line-height: 20px;
        }
        
        .close-btn:hover {
            color: #333;
        }
        
        .theme-option {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .theme-option:hover {
            background: #e9ecef;
            border-color: #667eea;
            transform: translateX(5px);
        }
        
        .theme-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .theme-description {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 Test Simplu - Buton Teme</h1>
        
        <div class="status">
            <h3>📊 Status Verificări:</h3>
            <div id="statusChecks"></div>
        </div>
        
        <button class="btn-test" onclick="testShowThemeMenu()">
            🎨 APASĂ AICI - TEST MODAL TEME
        </button>
        
        <button class="btn-test" onclick="clearLog()" style="background: #dc3545;">
            🗑️ Șterge Log
        </button>
        
        <div class="log" id="logConsole"></div>
        
        <div class="status">
            <h3>ℹ️ Instrucțiuni:</h3>
            <p>1. Apasă butonul "TEST MODAL TEME"</p>
            <p>2. Ar trebui să vezi un modal cu 6 teme</p>
            <p>3. Dacă NU vezi modalul, problema e la browser-ul tău</p>
            <p>4. Verifică log-urile mai jos</p>
        </div>
    </div>
    
    <!-- Modal pentru teme -->
    <div class="modal" id="themeModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 style="color: #667eea; margin-bottom: 20px;">🎨 Alege Tema</h2>
            <div id="themeOptions"></div>
        </div>
    </div>
    
    <script>
        let logCount = 0;
        
        function log(message, type = 'info') {
            logCount++;
            const logConsole = document.getElementById('logConsole');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#ff4444' : type === 'success' ? '#00ff00' : '#00ffff';
            logConsole.innerHTML += `<div style="color: ${color}">[${timestamp}] ${message}</div>`;
            logConsole.scrollTop = logConsole.scrollHeight;
            console.log(message);
        }
        
        function clearLog() {
            document.getElementById('logConsole').innerHTML = '';
            logCount = 0;
            log('Log șters!', 'info');
        }
        
        function updateStatus() {
            const checks = [
                { name: 'window.testShowThemeMenu', status: typeof window.testShowThemeMenu === 'function' },
                { name: 'Modal există în DOM', status: !!document.getElementById('themeModal') },
                { name: 'Modal content există', status: !!document.querySelector('.modal-content') },
                { name: 'Buton test există', status: !!document.querySelector('.btn-test') }
            ];
            
            const statusHTML = checks.map(check => 
                `<div style="margin: 5px 0;">${check.status ? '✅' : '❌'} ${check.name}</div>`
            ).join('');
            
            document.getElementById('statusChecks').innerHTML = statusHTML;
        }
        
        // Definește funcția global
        window.testShowThemeMenu = function() {
            log('🎨 testShowThemeMenu() APELATĂ!', 'success');
            
            try {
                const modal = document.getElementById('themeModal');
                if (!modal) {
                    log('❌ EROARE: Modal nu există în DOM!', 'error');
                    return;
                }
                
                log('✅ Modal găsit în DOM', 'success');
                
                // Creează opțiunile de teme
                const themes = [
                    { id: 'auto', icon: '🔄', name: 'Automată', desc: 'Se schimbă automat în funcție de sezon' },
                    { id: 'default', icon: '🍝', name: 'Trattoria Signature', desc: 'Tema clasică a restaurantului' },
                    { id: 'christmas', icon: '🎄', name: 'Nordic Luxury', desc: 'Temă festivă de iarnă' },
                    { id: 'autumn', icon: '🍂', name: 'Tuscan Vineyard', desc: 'Tema toamnei calde' },
                    { id: 'spring', icon: '🌸', name: 'Kyoto Garden', desc: 'Tema primăverii proaspete' },
                    { id: 'dark', icon: '🌙', name: 'Midnight Premium', desc: 'Temă întunecoasă pentru seară' }
                ];
                
                const themeOptionsHTML = themes.map(theme => `
                    <div class="theme-option" onclick="selectTheme('${theme.id}')">
                        <div class="theme-name">${theme.icon} ${theme.name}</div>
                        <div class="theme-description">${theme.desc}</div>
                    </div>
                `).join('');
                
                document.getElementById('themeOptions').innerHTML = themeOptionsHTML;
                log('✅ Opțiuni teme generate: ' + themes.length + ' teme', 'success');
                
                // Afișează modalul
                modal.style.display = 'block';
                log('✅ Modal afișat (display: block)', 'success');
                
                // Verifică stilurile
                const styles = window.getComputedStyle(modal);
                log(`📊 Modal styles: display=${styles.display}, visibility=${styles.visibility}, opacity=${styles.opacity}`, 'info');
                
                if (styles.display === 'block') {
                    log('🎉 SUCCESS! Modalul ar trebui să fie vizibil!', 'success');
                } else {
                    log('❌ PROBLEME: Modal display=' + styles.display, 'error');
                }
                
            } catch (error) {
                log('❌ EROARE: ' + error.message, 'error');
                console.error(error);
            }
        }
        
        window.closeModal = function() {
            log('🔴 closeModal() apelată', 'info');
            const modal = document.getElementById('themeModal');
            if (modal) {
                modal.style.display = 'none';
                log('✅ Modal ascuns', 'success');
            }
        }
        
        window.selectTheme = function(themeId) {
            log('🎯 Temă selectată: ' + themeId, 'success');
            closeModal();
        }
        
        // Click în afara modalului pentru a-l închide
        window.onclick = function(event) {
            const modal = document.getElementById('themeModal');
            if (event.target == modal) {
                closeModal();
            }
        }
        
        // Inițializare
        document.addEventListener('DOMContentLoaded', function() {
            log('✅ Pagină încărcată!', 'success');
            log('✅ window.testShowThemeMenu definită: ' + (typeof window.testShowThemeMenu === 'function'), 'info');
            updateStatus();
        });
        
        // Update status la fiecare 2 secunde
        setInterval(updateStatus, 2000);
    </script>
</body>
</html>
