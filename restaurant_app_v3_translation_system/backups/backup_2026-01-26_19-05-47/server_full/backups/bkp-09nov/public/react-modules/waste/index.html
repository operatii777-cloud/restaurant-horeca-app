<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; padding: 20px; }
        .waste-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-card { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%); color: white; border-radius: 12px; padding: 20px; }
        .chart-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-trash-alt me-2 text-danger"></i>Waste Management</h1>
            <button class="btn btn-danger" onclick="showReportWasteModal()">
                <i class="fas fa-plus me-2"></i>Raportare Pierdere
            </button>
        </div>
        
        <!-- KPI Cards -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stat-card">
                    <h5>Total Waste (Lună)</h5>
                    <h2 id="totalWasteMonth">0 RON</h2>
                    <small>Ultimele 30 zile</small>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h5>Waste % din CA</h5>
                    <h2 id="wastePercentage">0%</h2>
                    <small>Target: < 5%</small>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h5>Incidente</h5>
                    <h2 id="totalIncidents">0</h2>
                    <small>Raportări ultimele 30 zile</small>
                </div>
            </div>
        </div>
        
        <!-- Waste per Type -->
        <div class="waste-card mb-4">
            <h4 class="mb-3">Pierderi per Tip</h4>
            <div id="wasteByType">Se încarcă...</div>
        </div>
        
        <!-- Top 10 Products -->
        <div class="waste-card">
            <h4 class="mb-3">Top 10 Produse cu Waste</h4>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead><tr><th>Produs</th><th>Cantitate</th><th>Incidente</th><th>Cost Total</th></tr></thead>
                    <tbody id="topProductsTable"><tr><td colspan="4" class="text-center">Se încarcă...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        async function loadWasteDashboard() {
            try {
                const res = await fetch('/api/waste/dashboard?period=month');
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('totalWasteMonth').textContent = (data.data.total_waste || 0).toFixed(2) + ' RON';
                    document.getElementById('totalIncidents').textContent = data.data.by_type.reduce((sum, t) => sum + t.count, 0);
                    
                    // Waste by type
                    document.getElementById('wasteByType').innerHTML = data.data.by_type.map(t => `
                        <div class="mb-2">
                            <div class="d-flex justify-content-between">
                                <strong>${t.waste_type}</strong>
                                <span>${t.total.toFixed(2)} RON (${t.count} incidente)</span>
                            </div>
                        </div>
                    `).join('') || '<p class="text-muted">Nicio pierdere raportată</p>';
                    
                    // Top products
                    const tbody = document.getElementById('topProductsTable');
                    if (data.data.top_products.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Nicio pierdere raportată</td></tr>';
                    } else {
                        tbody.innerHTML = data.data.top_products.map(p => `
                            <tr>
                                <td>${p.item_name}</td>
                                <td>${p.total_quantity}</td>
                                <td>${p.incidents}</td>
                                <td><strong class="text-danger">${p.total_cost.toFixed(2)} RON</strong></td>
                            </tr>
                        `).join('');
                    }
                    
                    console.log('✅ Waste dashboard loaded');
                }
            } catch (error) {
                console.error('❌ Error:', error);
            }
        }
        
        function showReportWasteModal() {
            alert('Formular raportare waste - Coming Soon');
        }
        
        document.addEventListener('DOMContentLoaded', loadWasteDashboard);
    </script>
</body>
</html>
