<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Dashboard - Restaurant Management</title>
    <link rel="stylesheet" href="global-theme.css">
</head>
<body>
    <div id="root"></div>
    
    <!-- React & ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts for charts -->
    <script src="https://unpkg.com/recharts@2.5.0/dist/Recharts.js"></script>
    
    <!-- Our Components -->
    <script type="text/babel" src="components/Dashboard.jsx"></script>
    <script type="text/babel" src="components/KPICard.jsx"></script>
    <script type="text/babel" src="components/KPIChart.jsx"></script>
    <script type="text/babel" src="components/TrendChart.jsx"></script>
    <script type="text/babel" src="components/KPIConfigPanel.jsx"></script>
    <script type="text/babel" src="components/BrandingPanel.jsx"></script>
    <script type="text/babel" src="components/ThemeToggle.jsx"></script>
    
    <!-- Hooks -->
    <script type="text/babel" src="hooks/useTenant.js"></script>
    <script type="text/babel" src="hooks/useKPIs.js"></script>
    <script type="text/babel" src="hooks/useBranding.js"></script>
    <script type="text/babel" src="hooks/useKPIConfig.js"></script>
    
    <!-- Main App -->
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        function App() {
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            
            useEffect(() => {
                // Check API connectivity
                fetch('/api/bi/health')
                    .then(r => r.json())
                    .then(() => setLoading(false))
                    .catch(err => {
                        setError('Cannot connect to BI API');
                        setLoading(false);
                    });
            }, []);
            
            if (loading) {
                return (
                    <div style={{
                        display: 'flex',
                        justifyContent: 'center',
                        alignItems: 'center',
                        height: '100vh',
                        fontSize: '1.5rem',
                        color: '#666'
                    }}>
                        🔄 Loading BI Dashboard...
                    </div>
                );
            }
            
            if (error) {
                return (
                    <div style={{
                        display: 'flex',
                        flexDirection: 'column',
                        justifyContent: 'center',
                        alignItems: 'center',
                        height: '100vh',
                        fontSize: '1.2rem',
                        color: '#e74c3c'
                    }}>
                        <div style={{ fontSize: '3rem', marginBottom: '20px' }}>⚠️</div>
                        <div>{error}</div>
                        <button 
                            onClick={() => window.location.reload()}
                            style={{
                                marginTop: '20px',
                                padding: '10px 20px',
                                fontSize: '1rem',
                                background: '#3498db',
                                color: 'white',
                                border: 'none',
                                borderRadius: '5px',
                                cursor: 'pointer'
                            }}
                        >
                            Retry
                        </button>
                    </div>
                );
            }
            
            return (
                <div className="bi-app">
                    <header style={{
                        background: '#2c3e50',
                        color: 'white',
                        padding: '20px',
                        textAlign: 'center'
                    }}>
                        <h1>📊 Business Intelligence Dashboard</h1>
                        <p style={{ opacity: 0.8, marginTop: '5px' }}>
                            White-Label Multi-Tenant BI Platform
                        </p>
                    </header>
                    
                    <main style={{ padding: '20px' }}>
                        {typeof Dashboard !== 'undefined' ? (
                            <Dashboard />
                        ) : (
                            <div style={{
                                textAlign: 'center',
                                padding: '50px',
                                background: '#f0f4f8',
                                borderRadius: '10px'
                            }}>
                                <h2>🚀 BI Dashboard Components Loading...</h2>
                                <p style={{ marginTop: '10px', color: '#666' }}>
                                    React components are being initialized
                                </p>
                            </div>
                        )}
                    </main>
                    
                    <footer style={{
                        textAlign: 'center',
                        padding: '20px',
                        background: '#f8f9fa',
                        marginTop: '40px',
                        borderTop: '1px solid #dee2e6'
                    }}>
                        <p style={{ color: '#666', fontSize: '0.9rem' }}>
                            Restaurant Management System v3.0 - BI Platform © 2025
                        </p>
                    </footer>
                </div>
            );
        }
        
        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
