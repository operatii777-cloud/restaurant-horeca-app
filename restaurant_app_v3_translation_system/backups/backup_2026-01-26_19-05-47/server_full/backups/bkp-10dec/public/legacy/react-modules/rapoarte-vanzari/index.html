<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapoarte Vânzări</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; padding: 20px; }
        .report-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h1 class="mb-4"><i class="fas fa-chart-line me-2 text-success"></i>Rapoarte Vânzări</h1>
        
        <div class="report-card">
            <h5>Filtru Perioada</h5>
            <div class="row">
                <div class="col-md-4"><input type="date" id="startDate" class="form-control"></div>
                <div class="col-md-4"><input type="date" id="endDate" class="form-control"></div>
                <div class="col-md-4"><button class="btn btn-primary w-100" onclick="generateReport()">📊 Generează Raport</button></div>
            </div>
        </div>
        
        <div class="report-card">
            <h5 class="mb-3">Rezultate</h5>
            <div id="reportResults">Selectați perioada și generați raportul</div>
        </div>
    </div>
    
    <script>
        async function generateReport() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            
            if (!start || !end) {
                alert('Selectați perioada');
                return;
            }
            
            document.getElementById('reportResults').innerHTML = '<div class="text-center"><div class="spinner-border"></div></div>';
            
            try {
                const res = await fetch(`/api/orders?startDate=${start}&endDate=${end}&limit=1000`);
                const data = await res.json();
                
                if (data.success && data.data) {
                    const total = data.data.reduce((sum, o) => sum + (parseFloat(o.total_price) || 0), 0);
                    
                    document.getElementById('reportResults').innerHTML = `
                        <div class="alert alert-success">
                            <h4>📊 Raport ${start} - ${end}</h4>
                            <p class="mb-1"><strong>Total Comenzi:</strong> ${data.data.length}</p>
                            <p class="mb-0"><strong>Venituri Totale:</strong> ${total.toFixed(2)} RON</p>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('reportResults').innerHTML = `<div class="alert alert-danger">Eroare: ${error.message}</div>`;
            }
        }
        
        // Set dates
        document.getElementById('endDate').value = new Date().toISOString().split('T')[0];
        const start = new Date();
        start.setDate(start.getDate() - 30);
        document.getElementById('startDate').value = start.toISOString().split('T')[0];
    </script>
</body>
</html>
