<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#6366f1">
  
  <title>Restaurant App V3 - Mod Curier</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/courier-manifest.json">
  
  <!-- Icons -->
  <link rel="icon" href="/Trattoria.jpg" />
  <link rel="apple-touch-icon" href="/Trattoria.jpg" />
  
  <!-- Cache Control -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f8fafc;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    #root {
      min-height: 100vh;
    }
    
    /* Loader */
    .loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      z-index: 9999;
    }
    
    .loader-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: bounce 1s infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    .loader-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: #ffffff;
    }
    
    .loader-subtext {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="loader-icon">🏍️</div>
    <div class="loader-text">Restaurant App V3</div>
    <div class="loader-subtext">Mod Curier - Se încarcă...</div>
  </div>
  
  <script>
    // Înregistrare Service Worker pentru PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/courier-sw.js')
          .then(reg => console.log('✅ Service Worker înregistrat:', reg.scope))
          .catch(err => console.error('❌ Service Worker error:', err));
      });
    }
    
    // Redirect către admin-vite React app
    console.log('🚀 Courier App - Redirecting...');
    const params = new URLSearchParams(window.location.search);
    const queryStr = params.toString() ? '?' + params.toString() : '';
    window.location.href = `/admin-vite/courier${queryStr}`;
  </script>
</body>
</html>
