# ============================================
# 🐳 DOCKER COMPOSE - RESTAURANT APP
# Development & Production environments
# ============================================

version: '3.8'

services:
  # ==========================================
  # APPLICATION SERVER
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: restaurant-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - TZ=Europe/Bucharest
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
    volumes:
      # Persistent data
      - ./data:/app/data
      - ./logs:/app/logs
      - ./public/documents:/app/public/documents
      - ./backups:/app/backups
      # SQLite database (if not using PostgreSQL)
      - ./restaurant.db:/app/restaurant.db
    depends_on:
      - redis
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # REDIS - DISTRIBUTED CACHE
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: restaurant-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================
  # POSTGRESQL - DATABASE (Optional upgrade)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: restaurant-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=restaurant_db
      - POSTGRES_USER=restaurant_user
      - POSTGRES_PASSWORD=secure_password_change_in_production
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=ro_RO.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_user -d restaurant_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - with-postgres  # Only start with: docker-compose --profile with-postgres up

  # ==========================================
  # NGINX - REVERSE PROXY & LOAD BALANCER
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: restaurant-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - with-nginx  # Only start with: docker-compose --profile with-nginx up

# ==========================================
# NETWORKS
# ==========================================
networks:
  restaurant-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==========================================
# VOLUMES
# ==========================================
volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local

