<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Restaurant Management System - Admin Panel" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#667eea" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Curier" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <title>Restaurant Admin v4</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    
    <!-- 🚀 OPTIMIZARE ÎNCĂRCARE RESURSE -->
    <!-- Preconnect pentru API și Socket.IO -->
    <link rel="preconnect" href="/api" />
    <link rel="preconnect" href="/socket.io" />
    
    <!-- DNS Prefetch pentru resurse externe (dacă există) -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    
    <!-- Google Fonts - Dancing Script pentru Happy Hour Banner -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet" />
    
    <!-- Preload pentru resurse critice (Vite va înlocui cu hash-uri în build) -->
    <!-- Acestea vor fi adăugate automat de Vite în timpul build-ului -->
    
    <!-- Critical CSS inline (dacă este necesar) -->
    <style>
      /* Loading spinner minimal pentru prima încărcare */
      #root:empty::before {
        content: '';
        display: block;
        width: 40px;
        height: 40px;
        margin: 50px auto;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #764ba2;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- 🚀 Force reload on F5 (prevent cache) -->
    <script>
      // Force reload mechanism - interceptează F5 și forțează reîncărcarea
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        // Interceptează F5 și forțează hard reload
        window.addEventListener('keydown', (e) => {
          // F5 sau Ctrl+R
          if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
            // Nu face nimic - lasă browserul să facă reload normal
            // Headerele HTTP vor forța reîncărcarea
            return;
          }
        });
        
        // Forțează reîncărcarea resurselor la fiecare reload
        window.addEventListener('pageshow', (event) => {
          // Dacă e back/forward cache (bfcache), forțează reîncărcarea
          if (event.persisted) {
            window.location.reload();
          }
        });
        
        // 🛡️ Previne cache-ul pentru modulele JavaScript optimizate
        // Interceptează fetch și import-urile dinamice pentru modulele optimizate de Vite
        if (typeof window !== 'undefined') {
          const timestamp = Date.now();
          
          // Interceptează fetch pentru modulele optimizate
          const originalFetch = window.fetch;
          window.fetch = function(...args) {
            const url = args[0];
            if (typeof url === 'string') {
              // Adaugă timestamp pentru modulele optimizate de Vite
              if (url.includes('/node_modules/') || 
                  url.includes('chunk-') || 
                  url.includes('react-dom') ||
                  url.includes('react/jsx-runtime') ||
                  url.includes('react-bootstrap') ||
                  url.includes('react-router-dom')) {
                // Verifică dacă URL-ul are deja un query parameter
                const separator = url.includes('?') ? '&' : '?';
                // Adaugă timestamp unic la fiecare reload
                args[0] = url + separator + '_nc=' + timestamp;
              }
            }
            return originalFetch.apply(this, args);
          };
          
          // Interceptează import-urile dinamice
          const originalImport = window.__import__;
          if (typeof window.__import__ === 'undefined') {
            window.__import__ = function(url) {
              if (typeof url === 'string') {
                if (url.includes('/node_modules/') || 
                    url.includes('chunk-') || 
                    url.includes('react-dom') ||
                    url.includes('react/jsx-runtime')) {
                  const separator = url.includes('?') ? '&' : '?';
                  url = url + separator + '_nc=' + timestamp;
                }
              }
              return import(url);
            };
          }
        }
      }
    </script>
    
    <!-- 🚀 Performance optimization: Defer non-critical scripts -->
    <script>
      // Performance monitoring (doar în development)
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        const pageStart = performance.now();
        window.addEventListener('load', () => {
          const pageLoadTime = Math.round(performance.now() - pageStart);
          console.log(`⚡ Page load time: ${pageLoadTime}ms`);
        });
      }
      
      // 🛡️ Suprimare erori așteptate în consolă (pentru a reduce spam)
      // React error #520 este cauzat de minified code și nu poate fi remediat complet fără source maps
      const originalError = console.error;
      console.error = function(...args) {
        const message = args.join(' ');
        // Suprimă erorile React #520 (minified errors care nu pot fi remediate)
        if (message.includes('React error #520') || message.includes('Minified React error')) {
          // Nu logăm aceste erori - sunt cauzate de minified code
          return;
        }
        // Suprimă erorile 404 pentru resurse statice (așteptate)
        if (message.includes('Failed to load resource') && message.includes('404')) {
          // Nu logăm erorile 404 pentru resurse statice
          return;
        }
        // Logăm toate celelalte erori
        originalError.apply(console, args);
      };
      
      // Suprimă erorile de tip "pageerror" pentru React #520
      window.addEventListener('error', (event) => {
        if (event.message && event.message.includes('React error #520')) {
          event.preventDefault(); // Previne afișarea erorii în consolă
        }
      }, true);
    </script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      // Register Service Worker pentru PWA - DOAR în production
      // În development, service worker-ul cauzează probleme de cache
      if ('serviceWorker' in navigator) {
        // Detectează dacă suntem în development (localhost sau vite dev server)
        const isDevelopment = window.location.hostname === 'localhost' || 
                             window.location.hostname === '127.0.0.1' ||
                             window.location.port === '5173' ||
                             window.location.search.includes('dev=true');
        
        if (!isDevelopment) {
          // DOAR în production - înregistrează service worker-ul
          window.addEventListener('load', () => {
            // Use full path with base prefix for service worker
            const swPath = '/admin-vite/sw.js';
            navigator.serviceWorker.register(swPath, { scope: '/admin-vite/' })
              .then((registration) => {
                console.log('✅ Service Worker registered:', registration.scope);
                
                // Check for updates
                registration.addEventListener('updatefound', () => {
                  const newWorker = registration.installing;
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      console.log('🔄 New service worker available. Reload to update.');
                      // Poți afișa un banner pentru utilizator să reîmprospăteze
                    }
                  });
                });
              })
              .catch((error) => {
                console.warn('⚠️ Service Worker registration failed:', error);
              });
          });
        } else {
          // În development - dezactivează service worker-ul existent
          window.addEventListener('load', async () => {
            try {
              const registrations = await navigator.serviceWorker.getRegistrations();
              for (const registration of registrations) {
                await registration.unregister();
                console.log('🔧 Service Worker unregistered in development mode');
              }
            } catch (error) {
              console.warn('⚠️ Failed to unregister service worker:', error);
            }
          });
        }
      }
      
      // Handle PWA install prompt (Android/Chrome)
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Previne afișarea automată a prompt-ului
        e.preventDefault();
        deferredPrompt = e;
        console.log('📱 PWA install prompt available (Android/Chrome)');
        
        // Emite event pentru React component
        window.dispatchEvent(new CustomEvent('pwa-install-available'));
      });
      
      // Detectează dacă aplicația este instalată
      window.addEventListener('appinstalled', () => {
        console.log('✅ PWA installed successfully');
        deferredPrompt = null;
        window.dispatchEvent(new CustomEvent('pwa-installed'));
      });
      
      // Debug: Log PWA readiness
      window.addEventListener('load', () => {
        console.log('🔍 PWA Debug Info:', {
          isStandalone: window.matchMedia('(display-mode: standalone)').matches,
          isIOSStandalone: window.navigator.standalone === true,
          hasServiceWorker: 'serviceWorker' in navigator,
          userAgent: navigator.userAgent,
          manifestUrl: document.querySelector('link[rel="manifest"]')?.getAttribute('href')
        });
      });
    </script>
  </body>
</html>
