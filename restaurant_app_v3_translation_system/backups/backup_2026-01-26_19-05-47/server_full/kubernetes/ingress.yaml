# ═══════════════════════════════════════════════════════════════════════════
# KUBERNETES INGRESS - Restaurant App
# 
# Ingress pentru expunerea aplicației
# ═══════════════════════════════════════════════════════════════════════════

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: restaurant-app-ingress
  namespace: restaurant
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: restaurant-app-service
spec:
  tls:
  - hosts:
    - restaurant.example.com
    secretName: restaurant-tls
  rules:
  - host: restaurant.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: restaurant-app-service
            port:
              number: 3001
