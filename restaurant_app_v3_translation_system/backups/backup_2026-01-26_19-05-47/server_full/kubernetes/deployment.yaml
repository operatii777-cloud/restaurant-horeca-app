# ═══════════════════════════════════════════════════════════════════════════
# KUBERNETES DEPLOYMENT - Restaurant App
# 
# Deployment pentru production
# ═══════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-app
  namespace: restaurant
  labels:
    app: restaurant-app
    version: v3.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: restaurant-app
  template:
    metadata:
      labels:
        app: restaurant-app
        version: v3.0.0
    spec:
      containers:
      - name: restaurant-app
        image: restaurant-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: TZ
          value: "Europe/Bucharest"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: restaurant-data
          mountPath: /app/data
        - name: restaurant-logs
          mountPath: /app/logs
      volumes:
      - name: restaurant-data
        persistentVolumeClaim:
          claimName: restaurant-data-pvc
      - name: restaurant-logs
        persistentVolumeClaim:
          claimName: restaurant-logs-pvc
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: restaurant-app-service
  namespace: restaurant
  labels:
    app: restaurant-app
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: restaurant-app
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: restaurant-data-pvc
  namespace: restaurant
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: restaurant-logs-pvc
  namespace: restaurant
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
