<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>KIOSK - Terminal Ospătar</title>
    <!-- Redirect automat de la /kiosk.html la /kiosk pentru React Router -->
    <script>
      // Redirect IMEDIAT dacă accesăm kiosk.html direct (nu /kiosk)
      if (window.location.pathname === '/kiosk.html' || window.location.pathname === '/kiosk.html/') {
        console.log('🔄 kiosk.html - Redirect de la /kiosk.html la /kiosk');
        window.location.replace('/kiosk');
      }
    </script>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com http://localhost:5173 ws://localhost:5173 http://127.0.0.1:5173 ws://127.0.0.1:5173; connect-src 'self' http://localhost:5173 ws://localhost:5173 http://127.0.0.1:5173 ws://127.0.0.1:5173; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; font-src 'self' https://cdn.jsdelivr.net https://unpkg.com data:;" />
    <style>
      :root {
        font-family: "Segoe UI", "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        color-scheme: light;
        --bg-main: #f8f9fa;
        --panel: #ffffff;
        --panel-border: #dee2e6;
        --text-muted: #6c757d;
        --text-strong: #212529;
        --accent: #007bff;
        --accent-2: #0056b3;
        --danger: #dc3545;
        --success: #28a745;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-main);
        color: var(--text-strong);
        padding: 2rem;
        box-sizing: border-box;
        overflow: hidden;
      }
      body.is-ready {
        overflow: auto;
      }
      #root {
        width: 100%;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
      }
      #root[hidden] {
        display: none !important;
      }
      .kiosk-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg-main);
      }
      .kiosk-loader__logo {
        width: 120px;
        height: 120px;
        border-radius: 24px;
        background: linear-gradient(135deg, rgba(0, 123, 255, 0.15), rgba(0, 86, 179, 0.35));
        display: grid;
        place-items: center;
        font-size: 3rem;
        font-weight: 600;
        margin-bottom: 2rem;
        box-shadow: 0 8px 24px rgba(0, 123, 255, 0.2);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 2rem;
        letter-spacing: -0.02em;
        color: var(--text-strong);
      }
      p {
        margin: 0 0 1rem;
        color: var(--text-muted);
        font-size: 1.1rem;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 4px solid rgba(0, 123, 255, 0.15);
        border-top-color: var(--accent);
        animation: spin 1s linear infinite;
        margin: 1.5rem auto;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .progress-steps {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 0.75rem;
        margin: 2rem 0;
        max-width: 600px;
      }
      .progress-step {
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 1rem;
        font-size: 0.95rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--panel);
        transition: all 0.2s ease;
      }
      .progress-step.is-active {
        border-color: var(--accent);
        background: rgba(0, 123, 255, 0.05);
        color: var(--accent);
      }
      .progress-step.is-done {
        border-color: var(--success);
        background: rgba(40, 167, 69, 0.05);
        color: var(--success);
      }
      .progress-step__icon {
        font-size: 1.2rem;
      }
      .error-panel {
        background: #fff3cd;
        border: 1px solid #ffc107;
        border-radius: 12px;
        padding: 1.5rem;
        margin: 2rem 0;
        max-width: 600px;
        color: #856404;
      }
      .error-panel h3 {
        margin: 0 0 0.5rem;
        color: #856404;
      }
      .error-panel code {
        background: rgba(0, 0, 0, 0.05);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-family: 'Courier New', monospace;
        font-size: 0.9em;
      }
      .retry-button {
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 1rem;
        transition: background 0.2s ease;
      }
      .retry-button:hover {
        background: var(--accent-2);
      }
      .retry-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="root" hidden></div>
    
    <div class="kiosk-loader" id="loader">
      <div class="kiosk-loader__logo">🖥️</div>
      <h1>KIOSK - Terminal Ospătar</h1>
      <p>Se încarcă aplicația...</p>
      <div class="spinner"></div>
      <div class="progress-steps">
        <div class="progress-step" id="step-manifest">
          <span class="progress-step__icon">📋</span>
          <span>Verific manifest</span>
        </div>
        <div class="progress-step" id="step-assets">
          <span class="progress-step__icon">📦</span>
          <span>Încarc assets</span>
        </div>
        <div class="progress-step" id="step-app">
          <span class="progress-step__icon">🚀</span>
          <span>Pornește aplicația</span>
        </div>
      </div>
      <div id="error-panel" style="display: none;"></div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      // Verifică dacă dev server-ul este disponibil
      const checkDevServer = async () => {
        try {
          const response = await fetch('http://localhost:5173/@vite/client', { 
            method: 'HEAD',
            mode: 'no-cors',
            cache: 'no-store'
          });
          return true;
        } catch (err) {
          return false;
        }
      };

      // Determină modul: doar dacă ?dev=true este explicit
      // Implicit folosește build-ul de producție pentru siguranță
      const isDevExplicit = urlParams.get('dev') === 'true';
      let currentMode = 'auto';
      let retryCount = 0;
      const maxRetries = 3;

      const loader = document.getElementById('loader');
      const root = document.getElementById('root');
      const errorPanel = document.getElementById('error-panel');
      const retryButton = document.createElement('button');
      retryButton.className = 'retry-button';
      retryButton.textContent = 'Reîncearcă';
      retryButton.onclick = () => {
        retryCount = 0;
        startBootstrap('auto');
      };
      
      // Logging pentru debugging
      console.log('🚀 kiosk.html - Script încărcat');
      console.log('🔍 kiosk.html - window.location:', window.location.href);
      console.log('🔍 kiosk.html - root element:', document.getElementById('root'));
      
      // Bootstrap la încărcarea paginii
      window.addEventListener('DOMContentLoaded', () => {
        console.log('🚀 kiosk.html - DOMContentLoaded - Început bootstrap');
        startBootstrap('auto');
      });

      const updateStep = (stepId, state) => {
        const step = document.getElementById(stepId);
        if (!step) return;
        step.classList.remove('is-active', 'is-done');
        if (state === 'active') {
          step.classList.add('is-active');
        } else if (state === 'done') {
          step.classList.add('is-done');
        }
      };

      const setState = (state, message) => {
        const p = loader.querySelector('p');
        if (p) p.textContent = message || 'Se încarcă aplicația...';
      };

      const showError = (title, details) => {
        errorPanel.innerHTML = `
          <h3>${title}</h3>
          <p>${details}</p>
        `;
        errorPanel.style.display = 'block';
        errorPanel.appendChild(retryButton);
        setState('error', title);
      };

      const resetSteps = () => {
        ['step-manifest', 'step-assets', 'step-app'].forEach(id => {
          updateStep(id, '');
        });
      };

      const injectCss = (href) => {
        if (document.querySelector('link[data-kiosk-css="' + href + '"]')) {
          return;
        }
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = href;
        link.dataset.kioskCss = href;
        document.head.appendChild(link);
      };

      const injectScript = (src) =>
        new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.type = 'module';
          script.src = src;
          script.crossOrigin = 'anonymous';
          script.onload = resolve;
          script.onerror = () => reject(new Error('Nu pot încărca scriptul ' + src));
          document.body.appendChild(script);
        });

      const chooseEntry = (manifest) => {
        const preferred = ['src/main.tsx', 'src/main.jsx', 'src/main.ts', 'src/main.js'];
        for (const key of preferred) {
          if (manifest[key]) {
            return manifest[key];
          }
        }
        const fallback = Object.values(manifest).find((item) => item && item.isEntry);
        if (!fallback) {
          throw new Error('Entry principal lipsă în manifest');
        }
        return fallback;
      };

      const loadFromManifest = async () => {
        updateStep('step-manifest', 'active');
        const response = await fetch('/admin-vite/.vite/manifest.json', {
          cache: 'no-store',
          credentials: 'same-origin'
        });
        if (!response.ok) {
          throw new Error('Manifest indisponibil (HTTP ' + response.status + '). Rulează `npm --prefix admin-vite run build`');
        }
        const manifest = await response.json();
        const entry = chooseEntry(manifest);
        updateStep('step-manifest', 'done');

        const cssFiles = entry.css || [];
        if (cssFiles.length) {
          cssFiles.forEach((href) => injectCss('/admin-vite/' + href));
        }

        updateStep('step-assets', 'active');
        await injectScript('/admin-vite/' + entry.file);
        updateStep('step-assets', 'done');
      };

      const resolveDevOrigin = () => {
        if (urlParams.get('devOrigin')) {
          return urlParams.get('devOrigin');
        }
        return 'http://localhost:5173';
      };

      const loadDevServer = async () => {
        const origin = resolveDevOrigin().replace(/\/$/, '');
        updateStep('step-manifest', 'active');
        await injectScript(origin + '/@vite/client');
        updateStep('step-manifest', 'done');
        updateStep('step-assets', 'active');
        await injectScript(origin + '/src/main.tsx');
        updateStep('step-assets', 'done');
      };

      const startBootstrap = async (mode = 'auto') => {
        currentMode = mode;
        retryButton.disabled = true;
        errorPanel.style.display = 'none';
        setState('loading', mode === 'dev' ? 'Mod dev – conectez Vite…' : 'Încarc build-ul producție…');

        resetSteps();
        try {
          // Mod dev doar dacă este explicit solicitat sau dacă dev server-ul este disponibil
          const useDev = mode === 'dev' || (mode === 'auto' && isDevExplicit);
          
          if (useDev) {
            // Verifică din nou dacă dev server-ul este disponibil înainte de a încerca
            const devAvailable = await checkDevServer();
            if (devAvailable) {
              await loadDevServer();
            } else {
              // Dev server nu este disponibil, folosește build-ul de producție
              console.warn('⚠️ Dev server nu este disponibil, folosesc build-ul de producție');
              await loadFromManifest();
            }
          } else {
            await loadFromManifest();
          }

          updateStep('step-app', 'active');
          
          // Așteaptă ca React să monteze aplicația
          await new Promise(resolve => setTimeout(resolve, 1000));
          
          // NU mai forțăm redirect către /kiosk/tables!
          // Lasă React Router să gestioneze rutele corect
          // Route guard-urile din KioskLayout vor redirecționa automat către /kiosk/tables
          // dacă utilizatorul nu este autentificat și nu este deja pe o rută KIOSK validă
          
          console.log('🔍 Bootstrap - Verifică montarea React...');
          console.log('🔍 Bootstrap - window.location.pathname:', window.location.pathname);
          console.log('🔍 Bootstrap - root element:', document.getElementById('root'));
          
          // Verifică dacă React s-a montat - caută orice element React
          let reactMounted = false;
          for (let i = 0; i < 30; i++) {
            // Verifică dacă există elemente React în DOM
            const reactElements = document.querySelectorAll('[data-reactroot], .kiosk-layout, .kiosk-tables-page, [class*="kiosk"]');
            if (reactElements.length > 0) {
              console.log('✅ React este montat - elemente găsite:', reactElements.length);
              reactMounted = true;
              break;
            }
            console.log(`⏳ Aștept React să se monteze... (${i + 1}/30)`);
            await new Promise(resolve => setTimeout(resolve, 500));
          }
          
          if (!reactMounted) {
            console.error('❌ React nu s-a montat după 15 secunde!');
            console.error('🔍 Verifică erori JavaScript în consolă');
          }
          
          // Verifică dacă KIOSK layout este montat
          let kioskLayout = null;
          for (let i = 0; i < 20; i++) {
            kioskLayout = document.querySelector('.kiosk-layout');
            if (kioskLayout) {
              console.log('✅ KIOSK layout este montat');
              break;
            }
            console.log(`⏳ Aștept KIOSK layout... (${i + 1}/20)`);
            await new Promise(resolve => setTimeout(resolve, 500));
          }
          
          if (!kioskLayout) {
            console.error('❌ KIOSK layout nu este montat după 10 secunde!');
            // Verifică dacă există AppLayout (nu ar trebui să existe pentru KIOSK)
            const appLayout = document.querySelector('.layout:not(.kiosk-layout)');
            if (appLayout) {
              console.error('❌ AppLayout este montat pentru KIOSK - ar trebui să fie ascuns!');
            }
            // Verifică dacă există butonul de autentificare
            const loginButton = document.querySelector('button[data-kiosk-login="true"]');
            console.log('🔍 Buton autentificare în DOM:', !!loginButton);
          } else {
            // Verifică dacă există butonul de autentificare
            const loginButton = document.querySelector('button[data-kiosk-login="true"]');
            console.log('🔍 Buton autentificare în DOM:', !!loginButton);
            if (loginButton) {
              console.log('✅ Buton autentificare găsit!');
            } else {
              console.warn('⚠️ Buton autentificare NU este în DOM!');
            }
          }

          updateStep('step-app', 'done');
          setState('ready', 'Aplicația KIOSK este gata!');
          
          setTimeout(() => {
            loader.style.display = 'none';
            root.removeAttribute('hidden');
            document.body.classList.add('is-ready');
          }, 500);

        } catch (err) {
          console.error('❌ Eroare la încărcarea KIOSK:', err);
          
          // Dacă e eroare de dev server, încearcă automat build-ul de producție
          if ((err.message.includes('@vite/client') || err.message.includes('5173') || err.message.includes('Nu pot încărca scriptul')) && mode !== 'production') {
            console.warn('⚠️ Dev server nu este disponibil, încerc build-ul de producție...');
            setTimeout(() => {
              startBootstrap('production');
            }, 1000);
            return;
          }
          
          retryCount++;
          
          if (retryCount < maxRetries) {
            showError(
              'Eroare la încărcare',
              `Eroare: ${err.message}. Reîncercare ${retryCount}/${maxRetries}...`
            );
            setTimeout(() => startBootstrap(mode), 2000);
          } else {
            showError(
              'Nu s-a putut încărca KIOSK',
              `Eroare: ${err.message}<br><br>
              <strong>Soluții:</strong><br>
              1. Verifică că serverul rulează: <code>node server.js</code><br>
              2. Build Admin V4: <code>cd admin-vite && npm run build</code><br>
              3. Sau folosește mod dev: <code>?dev=true</code> (necesită <code>npm run dev</code> în admin-vite)`
            );
            retryButton.disabled = false;
          }
        }
      };

      // Auto-start - se execută imediat când scriptul se încarcă
      // Nu mai este nevoie de DOMContentLoaded pentru că scriptul este la sfârșitul body-ului
      console.log('🚀 kiosk.html - Auto-start bootstrap');
      startBootstrap('auto');
    </script>
  </body>
</html>
