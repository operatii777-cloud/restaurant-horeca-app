<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapoarte Financiare</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; padding: 20px; }
        .financial-card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .amount-big { font-size: 2rem; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h1 class="mb-4"><i class="fas fa-euro-sign me-2 text-success"></i>Rapoarte Financiare</h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="financial-card">
                    <h5>Venituri per Lună</h5>
                    <div class="amount-big text-success" id="monthRevenue">0 RON</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="financial-card">
                    <h5>TVA Colectat</h5>
                    <div class="amount-big text-primary" id="monthVAT">0 RON</div>
                </div>
            </div>
        </div>
        
        <div class="financial-card">
            <h5 class="mb-3">Defalcare TVA</h5>
            <div class="table-responsive">
                <table class="table">
                    <thead><tr><th>Cotă TVA</th><th>Bază Impozabilă</th><th>TVA</th><th>Total</th></tr></thead>
                    <tbody id="vatBreakdown"><tr><td colspan="4" class="text-center">Se încarcă...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        async function loadFinancialReport() {
            try {
                const endDate = new Date().toISOString().split('T')[0];
                const startDate = new Date(Date.now() - 30*24*60*60*1000).toISOString().split('T')[0];
                
                const res = await fetch(`/api/orders?startDate=${startDate}&endDate=${endDate}&limit=1000`);
                const data = await res.json();
                
                if (data.success && data.data) {
                    const total = data.data.reduce((sum, o) => sum + (parseFloat(o.total_price) || 0), 0);
                    const vat = total * 0.21 / 1.21; // Approximation
                    
                    document.getElementById('monthRevenue').textContent = total.toFixed(2) + ' RON';
                    document.getElementById('monthVAT').textContent = vat.toFixed(2) + ' RON';
                    
                    // TVA Breakdown (simplified)
                    const vat21 = total * 0.8 * 0.21 / 1.21;
                    const vat11 = total * 0.2 * 0.11 / 1.11;
                    
                    document.getElementById('vatBreakdown').innerHTML = `
                        <tr>
                            <td>21%</td>
                            <td>${(total * 0.8).toFixed(2)} RON</td>
                            <td>${vat21.toFixed(2)} RON</td>
                            <td>${(total * 0.8).toFixed(2)} RON</td>
                        </tr>
                        <tr>
                            <td>11%</td>
                            <td>${(total * 0.2).toFixed(2)} RON</td>
                            <td>${vat11.toFixed(2)} RON</td>
                            <td>${(total * 0.2).toFixed(2)} RON</td>
                        </tr>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadFinancialReport);
    </script>
</body>
</html>
