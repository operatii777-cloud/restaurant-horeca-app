<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import/Export Date</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; padding: 20px; }
        .import-card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .export-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 30px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .export-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h1 class="mb-4"><i class="fas fa-exchange-alt me-2 text-primary"></i>Import/Export Date</h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="import-card">
                    <h4 class="mb-3"><i class="fas fa-download me-2 text-success"></i>Export Date</h4>
                    
                    <div class="mb-3">
                        <label class="form-label">Perioada:</label>
                        <div class="row">
                            <div class="col-6"><input type="date" id="exportStart" class="form-control"></div>
                            <div class="col-6"><input type="date" id="exportEnd" class="form-control"></div>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button class="export-btn" onclick="exportOrders('json')">
                            <i class="fas fa-file-code me-2"></i>Export Comenzi (JSON)
                        </button>
                        <button class="export-btn" onclick="exportOrders('csv')">
                            <i class="fas fa-file-csv me-2"></i>Export Comenzi (CSV)
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="import-card">
                    <h4 class="mb-3"><i class="fas fa-upload me-2 text-warning"></i>Import Date</h4>
                    <div class="alert alert-info">
                        <h6 class="alert-heading">Format JSON pentru Import Ingrediente:</h6>
                        <pre class="mb-0 small">{
  "ingredients": [
    {
      "name": "Ingredient Nou",
      "unit": "kg",
      "current_stock": 10,
      "min_stock": 5,
      "cost_per_unit": 15.5,
      "category": "Legume"
    }
  ]
}</pre>
                    </div>
                    <input type="file" id="importFile" class="form-control mb-3" accept=".json">
                    <button class="btn btn-warning w-100" onclick="importData()">
                        <i class="fas fa-upload me-2"></i>Import Ingrediente
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function exportOrders(format) {
            const start = document.getElementById('exportStart').value;
            const end = document.getElementById('exportEnd').value;
            
            const url = `/api/export/orders?format=${format}&startDate=${start}&endDate=${end}`;
            window.open(url, '_blank');
        }
        
        async function importData() {
            const file = document.getElementById('importFile').files[0];
            if (!file) {
                alert('Selectați un fișier JSON');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    const res = await fetch('/api/import/ingredients', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    const result = await res.json();
                    
                    if (result.success) {
                        alert(`✅ Import reușit!\n\nImportate: ${result.imported}\nErori: ${result.errors}`);
                    } else {
                        alert(`❌ Eroare: ${result.error}`);
                    }
                } catch (error) {
                    alert(`❌ Eroare: ${error.message}`);
                }
            };
            reader.readAsText(file);
        }
        
        // Set default dates
        document.getElementById('exportEnd').value = new Date().toISOString().split('T')[0];
        const start = new Date();
        start.setMonth(start.getMonth() - 1);
        document.getElementById('exportStart').value = start.toISOString().split('T')[0];
    </script>
</body>
</html>
