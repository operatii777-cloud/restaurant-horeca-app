<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>🚚 Curier App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    
    /* Login Screen */
    .login-screen {
      flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 24px; text-align: center;
    }
    .login-logo { font-size: 4rem; margin-bottom: 16px; }
    .login-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 32px; }
    .login-input {
      width: 100%; max-width: 300px; padding: 16px; font-size: 1.1rem; text-align: center;
      border: 2px solid #334155; border-radius: 12px; background: #1e293b; color: white;
      margin-bottom: 16px;
    }
    .login-btn {
      width: 100%; max-width: 300px; padding: 16px; font-size: 1.1rem; font-weight: 600;
      background: linear-gradient(135deg, #22c55e, #16a34a); color: white;
      border: none; border-radius: 12px; cursor: pointer;
    }
    .login-error { color: #ef4444; margin-top: 16px; }
    
    /* Header */
    .header {
      background: #1e293b; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #334155;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .courier-avatar { width: 40px; height: 40px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .courier-name { font-weight: 600; }
    .courier-code { font-size: 0.8rem; color: #94a3b8; }
    .header-right { text-align: right; }
    .status-toggle {
      padding: 10px 20px; border: none; border-radius: 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
    }
    .status-toggle.offline { background: #22c55e; color: white; }
    .status-toggle.online { background: #ef4444; color: white; }
    
    /* Main Content */
    .main { flex: 1; padding: 16px; overflow-y: auto; }
    
    /* Stats Bar */
    .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-box { background: #1e293b; padding: 16px; border-radius: 12px; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #22c55e; }
    .stat-label { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
    
    /* Deliveries */
    .section-title { font-size: 1rem; color: #94a3b8; margin-bottom: 12px; }
    .no-deliveries {
      background: #1e293b; padding: 40px; border-radius: 16px; text-align: center; color: #64748b;
    }
    .no-deliveries .icon { font-size: 3rem; margin-bottom: 12px; }
    
    .delivery-card {
      background: #1e293b; border-radius: 16px; padding: 20px; margin-bottom: 16px;
      border-left: 4px solid #3b82f6;
    }
    .delivery-card.picked_up { border-left-color: #f59e0b; }
    
    .delivery-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .order-number { font-size: 1.2rem; font-weight: 700; }
    .delivery-status { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .delivery-status.assigned { background: #3b82f6; }
    .delivery-status.picked_up { background: #f59e0b; }
    
    .customer-info { margin-bottom: 16px; }
    .customer-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
    .customer-phone { display: flex; align-items: center; gap: 8px; color: #94a3b8; }
    .customer-phone a { color: #22c55e; text-decoration: none; }
    
    .address-box {
      background: #0f172a; padding: 12px; border-radius: 10px; margin-bottom: 16px;
    }
    .address-label { font-size: 0.75rem; color: #64748b; margin-bottom: 4px; }
    .address-text { font-size: 0.95rem; }
    
    .delivery-footer { display: flex; justify-content: space-between; align-items: center; }
    .order-total { font-size: 1.3rem; font-weight: 700; color: #22c55e; }
    .payment-type { padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; }
    .payment-type.cash { background: #fef3c7; color: #92400e; }
    .payment-type.card { background: #dbeafe; color: #1e40af; }
    
    .delivery-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .action-btn {
      padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .action-btn.navigate { background: #3b82f6; color: white; }
    .action-btn.call { background: #22c55e; color: white; }
    .action-btn.pickup { background: #f59e0b; color: white; grid-column: span 2; }
    .action-btn.delivered { background: #22c55e; color: white; grid-column: span 2; font-size: 1.2rem; }
    
    /* Bottom Nav */
    .bottom-nav {
      background: #1e293b; padding: 12px 20px; display: flex; justify-content: space-around;
      border-top: 1px solid #334155; position: sticky; bottom: 0;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; border: none; color: #64748b; font-size: 0.7rem; cursor: pointer;
    }
    .nav-item.active { color: #22c55e; }
    .nav-icon { font-size: 1.4rem; }
    
    /* History Screen */
    .history-item {
      background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .history-order { font-weight: 600; }
    .history-time { font-size: 0.8rem; color: #64748b; }
    .history-amount { font-weight: 700; color: #22c55e; }
    
    /* Hidden */
    .hidden { display: none !important; }
    
    /* Loading */
    .loading { text-align: center; padding: 40px; color: #64748b; }
    .loading .spinner { font-size: 2rem; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
      <div class="login-logo">🚚</div>
      <h1 class="login-title">Curier App</h1>
      <input type="text" class="login-input" id="courierCode" placeholder="Cod curier (DEL-XXXXXX)">
      <button class="login-btn" onclick="login()">🔓 Conectare</button>
      <div class="login-error hidden" id="loginError"></div>
    </div>
    
    <!-- Main App -->
    <div class="main-app hidden" id="mainApp">
      <div class="header">
        <div class="header-left">
          <div class="courier-avatar" id="courierAvatar">🛵</div>
          <div>
            <div class="courier-name" id="courierName">-</div>
            <div class="courier-code" id="courierCodeDisplay">-</div>
          </div>
        </div>
        <div class="header-right">
          <button class="status-toggle offline" id="statusToggle" onclick="toggleStatus()">
            ▶️ Start
          </button>
        </div>
      </div>
      
      <div class="main" id="mainContent">
        <!-- Stats -->
        <div class="stats-bar">
          <div class="stat-box">
            <div class="stat-value" id="todayCount">0</div>
            <div class="stat-label">Azi</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="activeCount">0</div>
            <div class="stat-label">Active</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="todayEarnings">0</div>
            <div class="stat-label">RON</div>
          </div>
        </div>
        
        <!-- Deliveries -->
        <div class="section-title">📦 Livrări Active</div>
        <div id="deliveriesContainer">
          <div class="no-deliveries">
            <div class="icon">📭</div>
            <div>Nicio livrare activă</div>
          </div>
        </div>
      </div>
      
      <!-- History Screen -->
      <div class="main hidden" id="historyContent">
        <div class="section-title">📜 Istoric Livrări</div>
        <div id="historyContainer"></div>
      </div>
      
      <!-- Bottom Nav -->
      <div class="bottom-nav">
        <button class="nav-item active" onclick="showScreen('deliveries')">
          <span class="nav-icon">📦</span>
          <span>Livrări</span>
        </button>
        <button class="nav-item" onclick="showScreen('history')">
          <span class="nav-icon">📜</span>
          <span>Istoric</span>
        </button>
        <button class="nav-item" onclick="logout()">
          <span class="nav-icon">🚪</span>
          <span>Ieșire</span>
        </button>
      </div>
    </div>
  </div>
  
  <script>
    let currentCourier = null;
    let currentStatus = 'offline';
    let locationWatchId = null;
    
    // Check saved session
    document.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('courierSession');
      if (saved) {
        currentCourier = JSON.parse(saved);
        showMainApp();
        loadDeliveries();
      }
    });
    
    async function login() {
      const code = document.getElementById('courierCode').value.trim().toUpperCase();
      const errorEl = document.getElementById('loginError');
      
      if (!code) {
        errorEl.textContent = 'Introdu codul de curier';
        errorEl.classList.remove('hidden');
        return;
      }
      
      try {
        const res = await fetch('/api/couriers');
        const data = await res.json();
        
        if (data.success) {
          const courier = data.couriers.find(c => c.code === code);
          if (courier) {
            currentCourier = courier;
            localStorage.setItem('courierSession', JSON.stringify(courier));
            showMainApp();
            loadDeliveries();
          } else {
            errorEl.textContent = 'Cod curier invalid';
            errorEl.classList.remove('hidden');
          }
        }
      } catch (err) {
        errorEl.textContent = 'Eroare conexiune';
        errorEl.classList.remove('hidden');
      }
    }
    
    function showMainApp() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      
      document.getElementById('courierName').textContent = currentCourier.name;
      document.getElementById('courierCodeDisplay').textContent = currentCourier.code;
      
      const vehicleIcons = { scooter: '🛵', car: '🚗', bicycle: '🚴', motorcycle: '🏍️' };
      document.getElementById('courierAvatar').textContent = vehicleIcons[currentCourier.vehicle_type] || '🚗';
      
      updateStatusButton();
    }
    
    function logout() {
      if (confirm('Sigur vrei să te deconectezi?')) {
        localStorage.removeItem('courierSession');
        currentCourier = null;
        stopLocationTracking();
        location.reload();
      }
    }
    
    async function toggleStatus() {
      const newStatus = currentStatus === 'offline' ? 'online' : 'offline';
      
      try {
        const res = await fetch(`/api/couriers/${currentCourier.id}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus })
        });
        
        const data = await res.json();
        if (data.success) {
          currentStatus = newStatus;
          updateStatusButton();
          
          if (newStatus === 'online') {
            startLocationTracking();
          } else {
            stopLocationTracking();
          }
        }
      } catch (err) {
        alert('Eroare la actualizare status');
      }
    }
    
    function updateStatusButton() {
      const btn = document.getElementById('statusToggle');
      if (currentStatus === 'offline') {
        btn.className = 'status-toggle offline';
        btn.textContent = '▶️ Start';
      } else {
        btn.className = 'status-toggle online';
        btn.textContent = '⏹️ Stop';
      }
    }
    
    function startLocationTracking() {
      if ('geolocation' in navigator) {
        locationWatchId = navigator.geolocation.watchPosition(
          (pos) => {
            updateLocation(pos.coords.latitude, pos.coords.longitude);
          },
          (err) => console.error('Location error:', err),
          { enableHighAccuracy: true, maximumAge: 30000, timeout: 27000 }
        );
      }
    }
    
    function stopLocationTracking() {
      if (locationWatchId) {
        navigator.geolocation.clearWatch(locationWatchId);
        locationWatchId = null;
      }
    }
    
    async function updateLocation(lat, lng) {
      try {
        await fetch(`/api/couriers/${currentCourier.id}/location`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lat, lng })
        });
      } catch (err) {
        console.error('Location update error:', err);
      }
    }
    
    async function loadDeliveries() {
      try {
        const res = await fetch(`/api/couriers/${currentCourier.id}/deliveries?status=assigned`);
        const data = await res.json();
        
        const res2 = await fetch(`/api/couriers/${currentCourier.id}/deliveries?status=picked_up`);
        const data2 = await res2.json();
        
        const deliveries = [...(data.deliveries || []), ...(data2.deliveries || [])];
        
        document.getElementById('activeCount').textContent = deliveries.length;
        renderDeliveries(deliveries);
        
        // Load today's completed
        const res3 = await fetch(`/api/couriers/${currentCourier.id}/deliveries?status=delivered`);
        const data3 = await res3.json();
        const today = new Date().toISOString().split('T')[0];
        const todayDeliveries = (data3.deliveries || []).filter(d => 
          d.delivered_at && d.delivered_at.startsWith(today)
        );
        document.getElementById('todayCount').textContent = todayDeliveries.length;
        
        const earnings = todayDeliveries.reduce((sum, d) => sum + (d.delivery_fee || 0) + (d.tip_amount || 0), 0);
        document.getElementById('todayEarnings').textContent = earnings.toFixed(0);
        
      } catch (err) {
        console.error('Error loading deliveries:', err);
      }
    }
    
    function renderDeliveries(deliveries) {
      const container = document.getElementById('deliveriesContainer');
      
      if (deliveries.length === 0) {
        container.innerHTML = `
          <div class="no-deliveries">
            <div class="icon">📭</div>
            <div>Nicio livrare activă</div>
          </div>
        `;
        return;
      }
      
      container.innerHTML = deliveries.map(d => `
        <div class="delivery-card ${d.status}">
          <div class="delivery-header">
            <span class="order-number">#${d.order_number || d.order_id || d.id}</span>
            <span class="delivery-status ${d.status}">${d.status === 'picked_up' ? '🚚 În drum' : '📋 Nou'}</span>
          </div>
          
          <div class="customer-info">
            <div class="customer-name">${d.customer_name || 'Client'}</div>
            <div class="customer-phone">
              📞 <a href="tel:${d.customer_phone}">${d.customer_phone || '-'}</a>
            </div>
          </div>
          
          <div class="address-box">
            <div class="address-label">📍 Adresa de livrare</div>
            <div class="address-text">${d.delivery_address || 'Neprecizată'}</div>
          </div>
          
          <div class="delivery-footer">
            <span class="order-total">${(d.total || 0).toFixed(2)} RON</span>
            <span class="payment-type ${d.payment_method || 'card'}">${d.payment_method === 'cash' ? '💵 Cash' : '💳 Card'}</span>
            ${d.is_paid == 1 || d.is_paid === true 
              ? '<span class="payment-status paid" style="background: #28a745; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; margin-left: 8px;">✅ Achitată</span>'
              : '<span class="payment-status unpaid" style="background: #ffc107; color: #000; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; margin-left: 8px;">⏳ Neachitată</span>'
            }
          </div>
          
          <div class="delivery-actions">
            <button class="action-btn navigate" onclick="navigateTo('${encodeURIComponent(d.delivery_address || '')}')">
              🗺️ Navighează
            </button>
            <button class="action-btn call" onclick="callCustomer('${d.customer_phone || ''}')">
              📞 Sună
            </button>
            ${d.status === 'assigned' 
              ? `<button class="action-btn pickup" onclick="updateDeliveryStatus(${d.id}, 'picked_up', ${d.order_id || d.orderId || 'null'})">📦 Am preluat comanda</button>`
              : `<div style="display: flex; flex-direction: column; gap: 8px;">
                  ${(d.is_paid == 0 || d.is_paid === false) && d.payment_method === 'cash'
                    ? `<button class="action-btn mark-paid" onclick="markOrderAsPaid(${d.order_id || d.orderId || 'null'}, ${d.id})" style="background: #28a745; color: white; grid-column: span 2; font-size: 1rem;">💰 Marchează ca achitată</button>`
                    : ''
                  }
                  <button class="action-btn delivered" onclick="updateDeliveryStatus(${d.id}, 'delivered', ${d.order_id || d.orderId || 'null'})">✅ AM LIVRAT!</button>
                </div>`
            }
          </div>
        </div>
      `).join('');
    }
    
    async function markOrderAsPaid(orderId, deliveryId) {
      if (!confirm('Confirmi că ai încasat plata pentru această comandă?')) return;
      
      try {
        const res = await fetch(`/api/orders/${orderId}/mark-paid`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' }
        });
        
        const data = await res.json();
        if (data.success) {
          alert('✅ Comandă marcată ca achitată!');
          loadDeliveries();
        } else {
          alert('Eroare: ' + (data.error || 'Nu s-a putut marca comanda ca achitată'));
        }
      } catch (err) {
        console.error('Eroare la marcarea ca achitată:', err);
        alert('Eroare: ' + err.message);
      }
    }
    
    async function updateDeliveryStatus(deliveryId, status, orderId = null) {
      const action = status === 'picked_up' ? 'preluarea' : 'livrarea';
      if (!confirm(`Confirmi ${action} comenzii?`)) return;
      
      try {
        // Dacă orderId nu este furnizat, îl obținem din delivery
        if (!orderId) {
          const deliveries = [...(await fetch(`/api/couriers/${currentCourier.id}/deliveries?status=assigned`).then(r => r.json()).then(d => d.deliveries || []).catch(() => [])),
                            ...(await fetch(`/api/couriers/${currentCourier.id}/deliveries?status=picked_up`).then(r => r.json()).then(d => d.deliveries || []).catch(() => []))];
          const delivery = deliveries.find(d => d.id === deliveryId);
          orderId = delivery?.order_id || delivery?.orderId || null;
        }
        
        let lat, lng;
        if ('geolocation' in navigator) {
          const pos = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
          }).catch(() => null);
          if (pos) {
            lat = pos.coords.latitude;
            lng = pos.coords.longitude;
          }
        }
        
        if (status === 'picked_up') {
          // Pentru preluare, folosim endpoint-ul vechi pentru delivery assignment
          const res = await fetch(`/api/couriers/delivery/${deliveryId}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status, lat, lng })
          });
          
          const data = await res.json();
          if (data.success) {
            alert('📦 Comandă preluată!');
            loadDeliveries();
          } else {
            alert('Eroare: ' + (data.error || 'Nu s-a putut marca comanda ca preluată'));
          }
        } else if (status === 'delivered') {
          // Pentru livrare, folosim endpoint-ul nou care marchează și ca achitată dacă e nevoie
          if (!orderId) {
            alert('Eroare: ID comandă negăsit!');
            return;
          }
          
          const res = await fetch(`/api/orders/${orderId}/deliver`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              delivered_by: 'courier',
              lat,
              lng
            })
          });
          
          const data = await res.json();
          if (data.success) {
            const message = data.wasPaid 
              ? '✅ Livrare finalizată!' 
              : '✅ Livrare finalizată și comandă marcată ca achitată!';
            alert(message);
            loadDeliveries();
          } else {
            alert('Eroare: ' + (data.error || 'Nu s-a putut marca comanda ca livrată'));
          }
        }
      } catch (err) {
        console.error('Eroare la actualizare status:', err);
        alert('Eroare: ' + err.message);
      }
    }
    
    function navigateTo(address) {
      if (!address) return alert('Adresă indisponibilă');
      const url = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(address)}`;
      window.open(url, '_blank');
    }
    
    function callCustomer(phone) {
      if (!phone) return alert('Telefon indisponibil');
      window.location.href = `tel:${phone}`;
    }
    
    function showScreen(screen) {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');
      
      if (screen === 'deliveries') {
        document.getElementById('mainContent').classList.remove('hidden');
        document.getElementById('historyContent').classList.add('hidden');
        loadDeliveries();
      } else if (screen === 'history') {
        document.getElementById('mainContent').classList.add('hidden');
        document.getElementById('historyContent').classList.remove('hidden');
        loadHistory();
      }
    }
    
    async function loadHistory() {
      try {
        // Folosește grouped=true pentru a obține datele grupate pe date calendaristice
        const res = await fetch(`/api/couriers/${currentCourier.id}/deliveries?status=delivered&grouped=true`);
        const data = await res.json();
        
        const container = document.getElementById('historyContainer');
        
        // Dacă avem date grupate, afișează-le pe date calendaristice
        if (data.grouped && data.byDate && data.byDate.length > 0) {
          container.innerHTML = data.byDate.map(dateGroup => {
            const dateObj = new Date(dateGroup.date);
            const dateStr = dateObj.toLocaleDateString('ro-RO', { 
              weekday: 'long', 
              year: 'numeric', 
              month: 'long', 
              day: 'numeric' 
            });
            
            return `
              <div style="margin-bottom: 24px; background: #0f172a; padding: 16px; border-radius: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #334155;">
                  <div>
                    <div style="font-size: 1.1rem; font-weight: 700; color: #22c55e; text-transform: capitalize;">${dateStr}</div>
                    <div style="font-size: 0.8rem; color: #64748b; margin-top: 4px;">${dateGroup.count} ${dateGroup.count === 1 ? 'comandă' : 'comenzi'} livrată</div>
                  </div>
                  <div style="text-align: right;">
                    <div style="font-size: 1.3rem; font-weight: 700; color: #22c55e;">${dateGroup.earnings.toFixed(2)} RON</div>
                    <div style="font-size: 0.75rem; color: #64748b;">Câștig</div>
                  </div>
                </div>
                <div>
                  ${dateGroup.deliveries.map(d => {
                    const deliveredTime = d.delivered_at ? new Date(d.delivered_at).toLocaleTimeString('ro-RO', { hour: '2-digit', minute: '2-digit' }) : '-';
                    const earnings = (parseFloat(d.delivery_fee || 0) + parseFloat(d.tip_amount || 0)).toFixed(2);
                    return `
                      <div class="history-item" style="margin-bottom: 8px;">
                        <div>
                          <div class="history-order">#${d.order_number}</div>
                          <div class="history-time">${deliveredTime}</div>
                        </div>
                        <div class="history-amount">+${earnings} RON</div>
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
            `;
          }).join('');
        } else {
          // Fallback la format vechi dacă nu avem date grupate
          const deliveries = (data.deliveries || []).slice(0, 20);
          
          if (deliveries.length === 0) {
            container.innerHTML = '<div class="no-deliveries"><div class="icon">📜</div><div>Niciun istoric</div></div>';
            return;
          }
          
          container.innerHTML = deliveries.map(d => {
            const deliveredTime = d.delivered_at ? new Date(d.delivered_at).toLocaleString('ro-RO') : '-';
            const earnings = (parseFloat(d.delivery_fee || 0) + parseFloat(d.tip_amount || 0)).toFixed(2);
            return `
              <div class="history-item">
                <div>
                  <div class="history-order">#${d.order_number}</div>
                  <div class="history-time">${deliveredTime}</div>
                </div>
                <div class="history-amount">+${earnings} RON</div>
              </div>
            `;
          }).join('');
        }
        
      } catch (err) {
        console.error('Error loading history:', err);
        container.innerHTML = '<div class="no-deliveries"><div class="icon">❌</div><div>Eroare la încărcarea istoricului</div></div>';
      }
    }
    
    // Auto-refresh every 30 seconds
    setInterval(() => {
      if (currentCourier && currentStatus === 'online') {
        loadDeliveries();
      }
    }, 30000);
  </script>
</body>
</html>
