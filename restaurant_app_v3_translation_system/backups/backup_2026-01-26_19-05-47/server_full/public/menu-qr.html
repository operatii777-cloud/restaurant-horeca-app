<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bun Venit - ${BRAND_CONFIG.restaurantName}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            max-width: 150px;
            margin-bottom: 20px;
            border-radius: 50%; /* Face logo-ul rotund */
        }
        h1 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
        }
        .main-action-btn {
            display: block;
            width: 100%;
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }
        .main-action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.3);
        }
        .pdf-menu-section {
            padding-top: 20px;
            margin-bottom: 30px;
        }
        .pdf-menu-section p {
            color: #666;
            margin-bottom: 20px;
        }
        .pdf-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .pdf-btn {
            display: inline-block;
            padding: 10px 20px;
            border: 2px solid #ff6b35;
            color: #ff6b35;
            background-color: #fff;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .pdf-btn:hover {
            background-color: #ff6b35;
            color: white;
        }
        .contact-info {
            border-top: 1px solid #e0e0e0;
            padding-top: 25px;
            margin-top: 10px;
        }
        .contact-info p {
            color: #555;
            margin: 8px 0;
            font-size: 0.9rem;
        }
        .contact-info a {
            color: #ff6b35;
            text-decoration: none;
            font-weight: 600;
        }
        
        /* ==================== MEDIA QUERIES PENTRU DESIGN RESPONSIVE ==================== */
        
        /* Ecrane foarte mari (4K, ultra-wide) */
        @media (min-width: 1920px) {
            .card {
                max-width: 600px;
                padding: 40px;
            }
            
            h1 {
                font-size: 2.8rem;
            }
            
            .subtitle {
                font-size: 1.4rem;
            }
            
            .main-action-btn {
                padding: 20px 40px;
                font-size: 1.3rem;
            }
            
            .pdf-btn {
                padding: 15px 25px;
                font-size: 1.1rem;
            }
        }
        
        /* Laptopuri mari */
        @media (min-width: 1440px) and (max-width: 1919px) {
            .card {
                max-width: 550px;
                padding: 35px;
            }
            
            h1 {
                font-size: 2.5rem;
            }
            
            .subtitle {
                font-size: 1.3rem;
            }
            
            .main-action-btn {
                padding: 18px 35px;
                font-size: 1.2rem;
            }
            
            .pdf-btn {
                padding: 14px 22px;
                font-size: 1.05rem;
            }
        }
        
        /* Laptopuri standard */
        @media (max-width: 1400px) {
            .card {
                max-width: 500px;
                padding: 30px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .subtitle {
                font-size: 1.2rem;
            }
            
            .main-action-btn {
                padding: 16px 30px;
                font-size: 1.1rem;
            }
            
            .pdf-btn {
                padding: 12px 20px;
                font-size: 1rem;
            }
        }
        
        /* Tablete mari */
        @media (max-width: 1200px) {
            body {
                padding: 15px;
            }
            
            .card {
                max-width: 450px;
                padding: 25px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .subtitle {
                font-size: 1.1rem;
            }
            
            .main-action-btn {
                padding: 14px 25px;
                font-size: 1rem;
            }
            
            .pdf-btn {
                padding: 10px 18px;
                font-size: 0.95rem;
            }
        }
        
        /* Tablete mici */
        @media (max-width: 992px) {
            body {
                padding: 12px;
            }
            
            .card {
                max-width: 400px;
                padding: 22px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
            
            .main-action-btn {
                padding: 12px 22px;
                font-size: 0.95rem;
            }
            
            .pdf-btn {
                padding: 9px 16px;
                font-size: 0.9rem;
            }
            
            .pdf-buttons {
                flex-direction: column;
                gap: 12px;
            }
        }
        
        /* Telefoane mari */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .card {
                max-width: 350px;
                padding: 20px;
            }
            
            .logo {
                width: 80px;
                height: 80px;
                margin-bottom: 15px;
            }
            
            h1 {
                font-size: 1.6rem;
                margin-bottom: 15px;
            }
            
            .subtitle {
                font-size: 0.95rem;
                margin-bottom: 20px;
            }
            
            .main-action-btn {
                padding: 12px 20px;
                font-size: 0.9rem;
                margin-bottom: 20px;
            }
            
            .pdf-btn {
                padding: 8px 14px;
                font-size: 0.85rem;
            }
            
            .pdf-buttons {
                flex-direction: column;
                gap: 10px;
            }
            
            .pdf-menu-section {
                margin: 20px 0;
            }
            
            .contact-info {
                padding-top: 20px;
            }
            
            .contact-info p {
                font-size: 0.85rem;
                margin: 6px 0;
            }
        }
        
        /* Telefoane mici */
        @media (max-width: 576px) {
            body {
                padding: 8px;
            }
            
            .card {
                max-width: 300px;
                padding: 18px;
            }
            
            .logo {
                width: 70px;
                height: 70px;
                margin-bottom: 12px;
            }
            
            h1 {
                font-size: 1.4rem;
                margin-bottom: 12px;
            }
            
            .subtitle {
                font-size: 0.9rem;
                margin-bottom: 18px;
            }
            
            .main-action-btn {
                padding: 10px 18px;
                font-size: 0.85rem;
                margin-bottom: 18px;
            }
            
            .pdf-btn {
                padding: 7px 12px;
                font-size: 0.8rem;
            }
            
            .pdf-buttons {
                flex-direction: column;
                gap: 8px;
            }
            
            .pdf-menu-section {
                margin: 18px 0;
            }
            
            .pdf-menu-section p {
                font-size: 0.85rem;
            }
            
            .contact-info {
                padding-top: 18px;
            }
            
            .contact-info p {
                font-size: 0.8rem;
                margin: 5px 0;
            }
        }
        
        /* Orientare landscape pe telefoane */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                padding: 5px;
            }
            
            .card {
                max-width: 400px;
                padding: 15px;
            }
            
            .logo {
                width: 60px;
                height: 60px;
                margin-bottom: 10px;
            }
            
            h1 {
                font-size: 1.2rem;
                margin-bottom: 10px;
            }
            
            .subtitle {
                font-size: 0.85rem;
                margin-bottom: 15px;
            }
            
            .main-action-btn {
                padding: 8px 15px;
                font-size: 0.8rem;
                margin-bottom: 15px;
            }
            
            .pdf-btn {
                padding: 6px 10px;
                font-size: 0.75rem;
            }
            
            .pdf-buttons {
                flex-direction: row;
                gap: 8px;
            }
            
            .pdf-menu-section {
                margin: 15px 0;
            }
            
            .contact-info {
                padding-top: 15px;
            }
            
            .contact-info p {
                font-size: 0.75rem;
                margin: 3px 0;
            }
        }
        
        /* Ecrane ultra-wide */
        @media (min-aspect-ratio: 21/9) {
            .card {
                max-width: 700px;
                padding: 50px;
            }
            
            h1 {
                font-size: 3rem;
            }
            
            .subtitle {
                font-size: 1.5rem;
            }
            
            .main-action-btn {
                padding: 25px 50px;
                font-size: 1.4rem;
            }
            
            .pdf-btn {
                padding: 18px 30px;
                font-size: 1.2rem;
            }
            
            .pdf-buttons {
                gap: 20px;
            }
            
            .contact-info p {
                font-size: 1rem;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="/QrOMS.jpg" alt="Logo QrOMS" class="logo">
        <h1>Restaurant App</h1>
        <p class="subtitle">Meniu Digital</p>
        
        <a href="#" onclick="goToFullMenu(event)" class="main-action-btn">
            🛒 Vezi Meniul Complet și Comandă
        </a>

        <div class="pdf-menu-section">
            <p>...sau consultă meniurile noastre în format PDF:</p>
            <div class="pdf-buttons">
                <a href="/api/menu/pdf/food/ro" target="_blank" class="pdf-btn">Meniu Mâncare</a>
                <a href="/api/menu/pdf/drinks/ro" target="_blank" class="pdf-btn">Meniu Băuturi</a>
            </div>
        </div>

        <div class="contact-info">
            <p>📞 <a href="tel:07xxxxxxxx">07xxxxxxxx</a></p>
            <p>✉️ <a href="mailto:trattoriamia@gmail.com">trattoriamia@gmail.com</a></p>
            <p>📍 Trattoria</p>
        </div>
    </div>

    <script>
        function initialize() {
            const params = new URLSearchParams(window.location.search);
            const tableNumber = params.get('table');

            if (tableNumber) {
                localStorage.setItem('tableNumber', tableNumber);
            } else {
                localStorage.removeItem('tableNumber');
            }
        }

        function goToFullMenu(event) {
            event.preventDefault();
            window.location.href = '/comanda.html';
        }

        document.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
    <script src="/branding/qroms-badge.js"></script>
</html>
