<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analiză - Restaurant App</title>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .dashboard-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-nav {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }

        .nav-btn.active {
            background: #764ba2;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .chart-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        .filters-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .filters-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .filters-row {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-label {
            font-size: 0.9rem;
            color: #666;
            font-weight: 500;
        }

        .filter-input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .filter-btn {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .filter-btn:hover {
            background: #5a6fd8;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.1rem;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
            font-size: 1.1rem;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .table-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        .data-table tr:hover {
            background: #f8f9fa;
        }

        .export-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 15px;
            transition: background 0.3s ease;
        }

        .export-btn:hover {
            background: #229954;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .filters-row {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-group {
                width: 100%;
            }
        }
        
        /* ==================== MEDIA QUERIES PENTRU DESIGN RESPONSIVE ==================== */
        
        /* Ecrane foarte mari (4K, ultra-wide) */
        @media (min-width: 1920px) {
            .dashboard-container {
                max-width: 1800px;
                padding: 20px 40px;
            }
            
            .dashboard-title {
                font-size: 2.5rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 25px;
            }
            
            .stat-card {
                padding: 25px;
            }
            
            .chart-container {
                padding: 25px;
            }
            
            .nav-btn {
                padding: 15px 25px;
                font-size: 1.1rem;
            }
        }
        
        /* Laptopuri mari */
        @media (min-width: 1440px) and (max-width: 1919px) {
            .dashboard-container {
                max-width: 1600px;
                padding: 15px 30px;
            }
            
            .dashboard-title {
                font-size: 2.2rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 22px;
            }
            
            .stat-card {
                padding: 22px;
            }
            
            .chart-container {
                padding: 22px;
            }
            
            .nav-btn {
                padding: 12px 22px;
                font-size: 1.05rem;
            }
        }
        
        /* Laptopuri standard */
        @media (max-width: 1400px) {
            .dashboard-container {
                padding: 12px 20px;
            }
            
            .dashboard-title {
                font-size: 2rem;
            }
            
            .stats-grid {
                gap: 20px;
            }
            
            .stat-card {
                padding: 20px;
            }
            
            .chart-container {
                padding: 20px;
            }
            
            .nav-btn {
                padding: 10px 20px;
                font-size: 1rem;
            }
        }
        
        /* Tablete mari */
        @media (max-width: 1200px) {
            .dashboard-container {
                padding: 10px 15px;
            }
            
            .dashboard-title {
                font-size: 1.8rem;
            }
            
            .dashboard-nav {
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .nav-btn {
                padding: 8px 16px;
                font-size: 0.95rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 18px;
            }
            
            .stat-card {
                padding: 18px;
            }
            
            .chart-container {
                padding: 18px;
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Tablete mici */
        @media (max-width: 992px) {
            .dashboard-container {
                padding: 8px 12px;
            }
            
            .dashboard-title {
                font-size: 1.6rem;
            }
            
            .dashboard-nav {
                flex-direction: column;
                gap: 6px;
            }
            
            .nav-btn {
                width: 100%;
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            
            .stat-card {
                padding: 16px;
            }
            
            .chart-container {
                padding: 16px;
            }
            
            .filters-row {
                flex-direction: column;
                gap: 15px;
            }
            
            .filter-group {
                width: 100%;
            }
            
            .filter-btn {
                width: 100%;
                padding: 12px;
            }
        }
        
        /* Telefoane mari */
        @media (max-width: 768px) {
            .dashboard-container {
                padding: 6px 10px;
            }
            
            .dashboard-title {
                font-size: 1.4rem;
            }
            
            .nav-btn {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            
            .stat-card {
                padding: 14px;
            }
            
            .stat-number {
                font-size: 1.8rem;
            }
            
            .stat-label {
                font-size: 0.9rem;
            }
            
            .chart-container {
                padding: 14px;
            }
            
            .chart-title {
                font-size: 1.1rem;
            }
            
            .table-container {
                padding: 14px;
            }
            
            .table-title {
                font-size: 1.1rem;
            }
            
            .data-table th,
            .data-table td {
                padding: 8px;
                font-size: 0.9rem;
            }
            
            .export-btn {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
        }
        
        /* Telefoane mici */
        @media (max-width: 576px) {
            .dashboard-container {
                padding: 5px 8px;
            }
            
            .dashboard-title {
                font-size: 1.2rem;
            }
            
            .nav-btn {
                padding: 6px 10px;
                font-size: 0.8rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .stat-card {
                padding: 12px;
            }
            
            .stat-number {
                font-size: 1.6rem;
            }
            
            .stat-label {
                font-size: 0.85rem;
            }
            
            .chart-container {
                padding: 12px;
            }
            
            .chart-title {
                font-size: 1rem;
            }
            
            .table-container {
                padding: 12px;
            }
            
            .table-title {
                font-size: 1rem;
            }
            
            .data-table th,
            .data-table td {
                padding: 6px;
                font-size: 0.8rem;
            }
            
            .export-btn {
                padding: 6px 10px;
                font-size: 0.8rem;
            }
            
            .filters-section {
                padding: 12px;
            }
            
            .filters-title {
                font-size: 1rem;
            }
            
            .filter-label {
                font-size: 0.85rem;
            }
            
            .filter-input {
                font-size: 0.85rem;
                padding: 6px;
            }
            
            .filter-btn {
                font-size: 0.8rem;
                padding: 8px 12px;
            }
        }
        
        /* Orientare landscape pe telefoane */
        @media (max-height: 600px) and (orientation: landscape) {
            .dashboard-title {
                font-size: 1rem;
            }
            
            .dashboard-nav {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .nav-btn {
                padding: 5px 8px;
                font-size: 0.75rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .stat-card {
                padding: 10px;
            }
            
            .chart-container {
                padding: 10px;
            }
            
            .table-container {
                padding: 10px;
            }
        }
        
        /* Ecrane ultra-wide */
        @media (min-aspect-ratio: 21/9) {
            .dashboard-container {
                max-width: 2000px;
                padding: 25px 50px;
            }
            
            .dashboard-title {
                font-size: 2.8rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 30px;
            }
            
            .stat-card {
                padding: 30px;
            }
            
            .chart-container {
                padding: 30px;
            }
            
            .nav-btn {
                padding: 18px 30px;
                font-size: 1.2rem;
            }
            
            .charts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1 class="dashboard-title">📊 Dashboard Analiză</h1>
            <div class="dashboard-nav">
                <button class="nav-btn active" onclick="showSection('overview')">Prezentare Generală</button>
                <button class="nav-btn" onclick="showSection('products')">Top Produse</button>
                <button class="nav-btn" onclick="showSection('waiters')">Performanță Ospătari</button>
                <button class="nav-btn" onclick="showSection('feedback')">Feedback Clienți</button>
                <button class="nav-btn" onclick="logout()">Deconectare</button>
            </div>
        </div>

        <!-- Filtre perioadă -->
        <div class="filters-section">
            <h3 class="filters-title">🔍 Filtre Perioadă</h3>
            <div class="filters-row">
                <div class="filter-group">
                    <label class="filter-label">Data de început:</label>
                    <input type="date" id="startDate" class="filter-input">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Data de sfârșit:</label>
                    <input type="date" id="endDate" class="filter-input">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Perioadă rapidă:</label>
                    <select id="quickPeriod" class="filter-input">
                        <option value="7">Ultimele 7 zile</option>
                        <option value="30" selected>Ultimele 30 zile</option>
                        <option value="90">Ultimele 90 zile</option>
                        <option value="365">Ultimul an</option>
                    </select>
                </div>
                <button class="filter-btn" onclick="applyFilters()">Aplică Filtre</button>
            </div>
        </div>

        <!-- Secțiunea Prezentare Generală -->
        <div id="overviewSection" class="section active">
            <!-- Statistici generale -->
            <div class="stats-grid" id="statsGrid">
                <div class="loading">🔄 Se încarcă statisticile...</div>
            </div>

            <!-- Grafice -->
            <div class="charts-grid">
                <div class="chart-container">
                    <h3 class="chart-title">📈 Comenzi pe Ore</h3>
                    <div class="chart-wrapper">
                        <canvas id="hourlyChart"></canvas>
                    </div>
                </div>
                <div class="chart-container">
                    <h3 class="chart-title">💰 Venituri Zilnice</h3>
                    <div class="chart-wrapper">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Secțiunea Top Produse -->
        <div id="productsSection" class="section">
            <div class="table-container">
                <h3 class="table-title">🍽️ Top 10 Produse Vândute</h3>
                <div id="productsTable">
                    <div class="loading">🔄 Se încarcă produsele...</div>
                </div>
                <button class="export-btn" onclick="exportData('products')">📊 Export Excel</button>
            </div>
        </div>

        <!-- Secțiunea Performanță Ospătari -->
        <div id="waitersSection" class="section">
            <div class="table-container">
                <h3 class="table-title">👨‍🍳 Performanța Ospătarilor</h3>
                <div id="waitersTable">
                    <div class="loading">🔄 Se încarcă performanța...</div>
                </div>
                <button class="export-btn" onclick="exportData('waiters')">📊 Export Excel</button>
            </div>
        </div>

        <!-- Secțiunea Feedback -->
        <div id="feedbackSection" class="section">
            <div class="charts-grid">
                <div class="chart-container">
                    <h3 class="chart-title">⭐ Distribuția Rating-urilor</h3>
                    <div class="chart-wrapper">
                        <canvas id="feedbackChart"></canvas>
                    </div>
                </div>
                <div class="chart-container">
                    <h3 class="chart-title">📊 Statistici Feedback</h3>
                    <div id="feedbackStats">
                        <div class="loading">🔄 Se încarcă feedback-ul...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variabile globale
        let currentPeriod = 30;
        let startDate = null;
        let endDate = null;
        let charts = {};

        // Inițializare
        document.addEventListener('DOMContentLoaded', function() {
            initializeDates();
            loadOverviewData();
        });

        function initializeDates() {
            const today = new Date();
            const thirtyDaysAgo = new Date(today);
            thirtyDaysAgo.setDate(today.getDate() - 30);

            document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
            document.getElementById('endDate').value = today.toISOString().split('T')[0];
        }

        function showSection(sectionName) {
            // Ascunde toate secțiunile
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            
            // Elimină clasa active de pe toate butoanele
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Afișează secțiunea selectată
            document.getElementById(sectionName + 'Section').classList.add('active');
            event.target.classList.add('active');
            
            // Încarcă datele pentru secțiunea selectată
            switch(sectionName) {
                case 'overview':
                    loadOverviewData(null, null, currentPeriod);
                    break;
                case 'products':
                    loadProductsData();
                    break;
                case 'waiters':
                    loadWaitersData();
                    break;
                case 'feedback':
                    loadFeedbackData();
                    break;
            }
        }

        async function loadOverviewData(startDate = null, endDate = null, period = 'today') {
            try {
                // Construiește query-ul cu parametrii de dată
                let queryParams = `?period=${period}`;
                if (startDate && endDate) {
                    queryParams += `&start=${startDate}&end=${endDate}`;
                }

                // Încarcă statistici generale
                const statsResponse = await fetch(`${SERVER_IP}/api/dashboard/stats${queryParams}`);
                const stats = await statsResponse.json();
                displayStats(stats);

                // Încarcă date pentru grafice
                const hourlyResponse = await fetch(`${SERVER_IP}/api/dashboard/hourly`);
                const hourlyData = await hourlyResponse.json();
                createHourlyChart(hourlyData);

                const revenueResponse = await fetch(`${SERVER_IP}/api/dashboard/daily-revenue`);
                const revenueData = await revenueResponse.json();
                createRevenueChart(revenueData);

            } catch (error) {
                console.error('Eroare la încărcarea datelor:', error);
                document.getElementById('statsGrid').innerHTML = '<div class="error">❌ Eroare la încărcarea datelor</div>';
            }
        }

        function displayStats(stats) {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-value">${stats.totalOrders}</div>
                    <div class="stat-label">Total Comenzi</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-value">${stats.totalRevenue} RON</div>
                    <div class="stat-label">Venituri Totale</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value">${stats.avgOrderValue} RON</div>
                    <div class="stat-label">Valoare Medie Comandă</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-value">${stats.totalCustomers}</div>
                    <div class="stat-label">Clienți Unici</div>
                </div>
            `;
        }

        function createHourlyChart(data) {
            const ctx = document.getElementById('hourlyChart').getContext('2d');
            
            if (charts.hourly) {
                charts.hourly.destroy();
            }

            charts.hourly = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(item => `${item.hour}:00`),
                    datasets: [{
                        label: 'Comenzi',
                        data: data.map(item => item.orders_count),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function createRevenueChart(data) {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            
            if (charts.revenue) {
                charts.revenue.destroy();
            }

            charts.revenue = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(item => new Date(item.date).toLocaleDateString('ro-RO')),
                    datasets: [{
                        label: 'Venituri (RON)',
                        data: data.map(item => item.avg_order_value * item.orders_count),
                        backgroundColor: '#764ba2',
                        borderColor: '#5a3d7a',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        async function loadProductsData() {
            try {
                const response = await fetch(`${SERVER_IP}/api/dashboard/top-products`);
                const products = await response.json();
                displayProductsTable(products);
            } catch (error) {
                console.error('Eroare la încărcarea produselor:', error);
                document.getElementById('productsTable').innerHTML = '<div class="error">❌ Eroare la încărcarea produselor</div>';
            }
        }

        function displayProductsTable(products) {
            const table = document.getElementById('productsTable');
            table.innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Poziție</th>
                            <th>Nume Produs</th>
                            <th>Categorie</th>
                            <th>Comenzi</th>
                            <th>Venituri (RON)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${products.map((product, index) => `
                            <tr>
                                <td>${index + 1}</td>
                                <td>${product.name}</td>
                                <td>${product.category}</td>
                                <td>${product.orders_count}</td>
                                <td>${Math.round(product.total_revenue * 100) / 100}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function loadWaitersData() {
            try {
                const response = await fetch(`${SERVER_IP}/api/dashboard/waiters`);
                const waiters = await response.json();
                displayWaitersTable(waiters);
            } catch (error) {
                console.error('Eroare la încărcarea ospătarilor:', error);
                document.getElementById('waitersTable').innerHTML = '<div class="error">❌ Eroare la încărcarea ospătarilor</div>';
            }
        }

        function displayWaitersTable(waiters) {
            const table = document.getElementById('waitersTable');
            table.innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Nume Ospătar</th>
                            <th>Comenzi Gestionate</th>
                            <th>Mese Servite</th>
                            <th>Comenzi Plătite</th>
                            <th>Timp Mediu Preparare (min)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${waiters.map(waiter => `
                            <tr>
                                <td>${waiter.name}</td>
                                <td>${waiter.orders_managed}</td>
                                <td>${waiter.tables_served}</td>
                                <td>${waiter.paid_orders}</td>
                                <td>${waiter.avg_prep_time_minutes ? Math.round(waiter.avg_prep_time_minutes) : 'N/A'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function loadFeedbackData() {
            try {
                const response = await fetch(`${SERVER_IP}/api/dashboard/feedback`);
                const feedback = await response.json();
                createFeedbackChart(feedback.ratingDistribution);
                displayFeedbackStats(feedback);
            } catch (error) {
                console.error('Eroare la încărcarea feedback-ului:', error);
                document.getElementById('feedbackStats').innerHTML = '<div class="error">❌ Eroare la încărcarea feedback-ului</div>';
            }
        }

        function createFeedbackChart(ratingData) {
            const ctx = document.getElementById('feedbackChart').getContext('2d');
            
            if (charts.feedback) {
                charts.feedback.destroy();
            }

            charts.feedback = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ratingData.map(item => `${item.rating} stele`),
                    datasets: [{
                        data: ratingData.map(item => item.count),
                        backgroundColor: [
                            '#e74c3c',
                            '#f39c12',
                            '#f1c40f',
                            '#2ecc71',
                            '#27ae60'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function displayFeedbackStats(feedback) {
            const stats = document.getElementById('feedbackStats');
            stats.innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon">⭐</div>
                    <div class="stat-value">${feedback.avgRating}/5</div>
                    <div class="stat-label">Rating Mediu</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💬</div>
                    <div class="stat-value">${feedback.totalFeedback}</div>
                    <div class="stat-label">Total Feedback</div>
                </div>
            `;
        }

        function applyFilters() {
            const quickPeriod = document.getElementById('quickPeriod').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            currentPeriod = quickPeriod;
            
            // Extinderea logicii pentru a prioritiza filtrele custom
            let start = null;
            let end = null;
            
            // Dacă se folosesc date custom, ignorăm quickPeriod
            if (startDate && endDate) {
                start = startDate;
                end = endDate;
                currentPeriod = 'custom'; // Marcăm perioada ca fiind custom
            }
            
            // Reîncarcă datele, trimițând acum parametrii de dată
            loadOverviewData(start, end, currentPeriod);
        }

        function exportData(type) {
            // Preluăm intervalul curent, setat de applyFilters sau la încărcarea inițială
            const quickPeriod = document.getElementById('quickPeriod').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            let queryParams = `?period=${currentPeriod}`;
            if (startDate && endDate) {
                queryParams += `&start=${startDate}&end=${endDate}`;
            }

            const exportUrl = `${SERVER_IP}/api/dashboard/export/${type}${queryParams}`;
            
            // Descarcă fișierul generat de server
            // Serverul trebuie să răspundă cu un header Content-Disposition: attachment
            window.open(exportUrl, '_blank');
            showNotification(`Se pregătește exportul ${type}... Descărcarea va începe în curând.`);
        }

        function showNotification(message, type = 'success') {
            // Implementare simplă de notificare
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'error' ? '#dc3545' : '#28a745'};
                color: white;
                padding: 15px 20px;
                border-radius: 5px;
                z-index: 1000;
                font-weight: bold;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                document.body.removeChild(notification);
            }, 3000);
        }

        function logout() {
            if (confirm('Sigur vrei să te deconectezi?')) {
                localStorage.removeItem('staffAuthenticated');
                window.location.href = 'admin.html';
            }
        }
    </script>
</body>

</html>
