<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Sistem Traducere Modular</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .language-switcher { margin: 10px 0; }
        .language-btn { margin: 5px; padding: 8px 15px; }
        .result { background: #f0f0f0; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🧪 Test Sistem Traducere Modular</h1>
    
    <!-- Butoane comutare limbă -->
    <div class="language-switcher">
        <button class="language-btn" onclick="testChangeLanguage('ro')">RO</button>
        <button class="language-btn" onclick="testChangeLanguage('en')">EN</button>
    </div>
    
    <!-- Teste traduceri -->
    <div class="test-section">
        <h2>Test Traduceri Header</h2>
        <p data-translate="header.adminPanel">Admin Panel</p>
        <p data-translate="header.adminPin">PIN Administrator:</p>
        <p data-translate="header.enterPin">Introduceți PIN-ul</p>
    </div>
    
    <div class="test-section">
        <h2>Test Traduceri Produse</h2>
        <p data-translate="products.productName">Nume Produs</p>
        <p data-translate="products.price">Preț</p>
        <p data-translate="products.description">Descriere</p>
    </div>
    
    <div class="test-section">
        <h2>Test Placeholders</h2>
        <input data-translate-placeholder="header.enterPin" placeholder="Introduceți PIN-ul">
    </div>
    
    <div class="test-section">
        <h2>Test JavaScript API</h2>
        <button onclick="testJavaScriptAPI()">Test API JavaScript</button>
        <div id="apiResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test Conținut Dinamic</h2>
        <button onclick="addDynamicContent()">Adaugă Conținut Dinamic</button>
        <div id="dynamicContent"></div>
    </div>
    
    <div class="test-section">
        <h2>Status Sistem</h2>
        <div id="systemStatus" class="result"></div>
    </div>

    <!-- Încarcă sistemul de traducere -->
    <script src="/translation/translation.js"></script>
    
    <script>
        // Funcții de test
        async function testChangeLanguage(lang) {
            console.log(`Testing language change to: ${lang}`);
            try {
                await changeLanguage(lang);
                updateSystemStatus();
                console.log(`✅ Language changed to ${lang}`);
            } catch (error) {
                console.error(`❌ Error changing language:`, error);
            }
        }
        
        async function testJavaScriptAPI() {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.innerHTML = 'Testing JavaScript API...';
            
            try {
                // Test traduceri individuale
                const adminPanel = await getTranslation('header.adminPanel');
                const productName = await getTranslation('products.productName');
                const currentLang = window.translationManager.getCurrentLanguage();
                const supportedLangs = window.translationManager.getSupportedLanguages();
                
                resultDiv.innerHTML = `
                    <strong>✅ API Test Results:</strong><br>
                    Current Language: ${currentLang}<br>
                    Supported Languages: ${supportedLangs.join(', ')}<br>
                    Admin Panel Translation: "${adminPanel}"<br>
                    Product Name Translation: "${productName}"<br>
                    <em>All tests passed!</em>
                `;
                
                console.log('✅ JavaScript API test passed');
            } catch (error) {
                resultDiv.innerHTML = `<strong>❌ API Test Failed:</strong><br>${error.message}`;
                console.error('❌ JavaScript API test failed:', error);
            }
        }
        
        function addDynamicContent() {
            const container = document.getElementById('dynamicContent');
            const newElement = document.createElement('p');
            newElement.setAttribute('data-translate', 'products.category');
            newElement.textContent = 'Categorie';
            container.appendChild(newElement);
            
            console.log('✅ Dynamic content added - should auto-translate');
        }
        
        function updateSystemStatus() {
            const statusDiv = document.getElementById('systemStatus');
            const manager = window.translationManager;
            
            if (manager) {
                statusDiv.innerHTML = `
                    <strong>System Status:</strong><br>
                    Initialized: ${manager.isInitialized ? '✅ Yes' : '❌ No'}<br>
                    Current Language: ${manager.getCurrentLanguage()}<br>
                    Supported Languages: ${manager.getSupportedLanguages().join(', ')}<br>
                    Cache Status: ${Object.keys(manager.translations).length} languages loaded<br>
                    Debug Mode: ${manager.config.debug ? 'ON' : 'OFF'}
                `;
            } else {
                statusDiv.innerHTML = '<strong>❌ TranslationManager not available</strong>';
            }
        }
        
        // Inițializare la încărcarea paginii
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🧪 Test page loaded');
            
            // Așteaptă ca sistemul să se inițializeze
            setTimeout(() => {
                updateSystemStatus();
                console.log('✅ Test page ready');
            }, 1000);
        });
        
        // Ascultă schimbările de limbă
        document.addEventListener('languageChanged', (event) => {
            console.log(`🔄 Language changed event: ${event.detail.language}`);
            updateSystemStatus();
        });
    </script>
</body>
</html>
