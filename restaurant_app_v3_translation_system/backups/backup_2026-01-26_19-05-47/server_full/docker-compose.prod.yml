# ═══════════════════════════════════════════════════════════════════════════
# DOCKER COMPOSE - Restaurant App Production
# 
# Pentru deployment production
# ═══════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  restaurant-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restaurant-app-prod
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - TZ=Europe/Bucharest
    volumes:
      # Mount database pentru persistență
      - restaurant-data:/app/data
      # Mount logs
      - restaurant-logs:/app/logs
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    networks:
      - restaurant-network

  nginx:
    image: nginx:alpine
    container_name: restaurant-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - restaurant-app
    restart: always
    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge

volumes:
  restaurant-data:
    driver: local
  restaurant-logs:
    driver: local
