# Core API Endpoints Documentation

paths:
  /api/orders:
    get:
      tags:
        - Orders
      summary: Get all orders
      description: Retrieve a list of orders with optional filtering
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, preparing, ready, completed, cancelled]
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
    post:
      tags:
        - Orders
      summary: Create new order
      description: Create a new order in the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      quantity:
                        type: integer
                      notes:
                        type: string
                table_number:
                  type: integer
                customer_name:
                  type: string
                order_source:
                  type: string
                  enum: [pos, delivery, kiosk, online]
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  order_id:
                    type: integer

  /api/orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
    put:
      tags:
        - Orders
      summary: Update order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, preparing, ready, completed, cancelled]
      responses:
        '200':
          description: Order updated

  /api/menu:
    get:
      tags:
        - Menu
      summary: Get menu items
      description: Retrieve all menu items with categories
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Menu items
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/MenuItem'

  /api/ingredients:
    get:
      tags:
        - Inventory
      summary: Get ingredients
      description: Retrieve all ingredients with stock levels
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: low_stock
          in: query
          schema:
            type: boolean
          description: Filter by low stock items only
      responses:
        '200':
          description: Ingredients list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ingredients:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ingredient'

  /api/stats/delivery:
    get:
      tags:
        - Reports
      summary: Get delivery statistics
      description: Retrieve delivery performance metrics
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Delivery statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      total_deliveries:
                        type: integer
                      completed:
                        type: integer
                      average_delivery_time_minutes:
                        type: number
                      completion_rate:
                        type: number

  /api/bi/sales-summary:
    get:
      tags:
        - Reports
      summary: Get sales summary
      description: Business intelligence sales summary
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, year]
      responses:
        '200':
          description: Sales summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      total_sales:
                        type: number
                      total_orders:
                        type: integer
                      average_order_value:
                        type: number
                      top_categories:
                        type: array
                        items:
                          type: object

  /api/webhooks:
    get:
      tags:
        - Webhooks
      summary: List webhooks
      description: Get all webhook subscriptions
      responses:
        '200':
          description: Webhooks list
    post:
      tags:
        - Webhooks
      summary: Create webhook
      description: Subscribe to webhook events
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - events
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
                  description: "Events: order.created, order.completed, inventory.low_stock, etc."
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'

  /api/food-cost/analysis:
    get:
      tags:
        - Reports
      summary: Food cost analysis
      description: Theoretical vs actual food cost analysis
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Food cost analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      theoretical_cost:
                        type: number
                      actual_cost:
                        type: number
                      variance:
                        type: number
                      variance_percentage:
                        type: number
                      by_category:
                        type: array

