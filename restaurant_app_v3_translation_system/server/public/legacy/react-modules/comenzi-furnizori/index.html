<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comenzi Furnizori</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; padding: 20px; }
        .order-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .status-draft { border-left: 4px solid #6c757d; }
        .status-sent { border-left: 4px solid #17a2b8; }
        .status-delivered { border-left: 4px solid #28a745; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between mb-4">
            <h1><i class="fas fa-shopping-cart me-2 text-primary"></i>Comenzi Furnizori</h1>
            <button class="btn btn-primary" onclick="showSmartOrder()">
                <i class="fas fa-magic me-2"></i>Smart Order (Auto-Detect)
            </button>
        </div>
        
        <div id="ordersContainer">
            <div class="text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-3">Se încarcă...</p></div>
        </div>
    </div>
    
    <script>
        async function loadSupplierOrders() {
            try {
                const res = await fetch('/api/supplier-orders?limit=20');
                const data = await res.json();
                
                const container = document.getElementById('ordersContainer');
                
                if (data.success && data.data.length > 0) {
                    container.innerHTML = data.data.map(order => `
                        <div class="order-card status-${order.status}">
                            <div class="row">
                                <div class="col-md-8">
                                    <h5>${order.order_number} - ${order.supplier_name || 'Unknown'}</h5>
                                    <p class="mb-1 text-muted small">Data comandă: ${order.order_date}</p>
                                    <p class="mb-0"><strong>Total:</strong> ${order.total_amount.toFixed(2)} RON</p>
                                </div>
                                <div class="col-md-4 text-end">
                                    <span class="badge bg-secondary">${order.status}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="alert alert-info">Nu există comenzi către furnizori</div>';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function showSmartOrder() {
            try {
                const res = await fetch('/api/supplier-orders/smart-order', { method: 'POST' });
                const data = await res.json();
                
                if (data.success && data.suggestions.length > 0) {
                    alert(`🤖 Smart Order:\n\n${data.message}\n\nIngrediente sugerate:\n${data.suggestions.slice(0, 5).map(s => `- ${s.ingredient_name}: ${s.suggested_quantity} ${s.unit}`).join('\n')}`);
                } else {
                    alert('✅ Toate ingredientele sunt în stoc!');
                }
            } catch (error) {
                alert(`Eroare: ${error.message}`);
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadSupplierOrders);
    </script>
</body>
</html>
