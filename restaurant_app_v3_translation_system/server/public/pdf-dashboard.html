<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Meniuri - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            color: #667eea;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }
        
        .stat-card .label {
            color: #999;
            font-size: 12px;
        }
        
        .pdfs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .pdf-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .pdf-card h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .pdf-card .icon {
            font-size: 24px;
        }
        
        .pdf-info {
            margin: 15px 0;
        }
        
        .pdf-info .row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .pdf-info .row:last-child {
            border-bottom: none;
        }
        
        .pdf-info .label {
            color: #666;
            font-size: 14px;
        }
        
        .pdf-info .value {
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-badge.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-badge.warning {
            background: #fff3cd;
            color: #856404;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 PDF Meniuri - Dashboard</h1>
            <p>Monitorizare și management PDF-uri meniu restaurant</p>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Încărcare date...</p>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="content" style="display: none;">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total PDF-uri</h3>
                    <div class="value" id="stat-total">-</div>
                    <div class="label">Generat</div>
                </div>
                
                <div class="stat-card">
                    <h3>În Cache</h3>
                    <div class="value" id="stat-cached">-</div>
                    <div class="label">Disponibil</div>
                </div>
                
                <div class="stat-card">
                    <h3>Dimensiune Totală</h3>
                    <div class="value" id="stat-size">-</div>
                    <div class="label">MB</div>
                </div>
                
                <div class="stat-card">
                    <h3>Status</h3>
                    <div class="value">
                        <span id="stat-status" class="status-badge">-</span>
                    </div>
                    <div class="label">Sistem</div>
                </div>
            </div>
            
            <!-- PDFs Grid -->
            <div class="pdfs-grid" id="pdfs-container"></div>
            
            <!-- Global Actions -->
            <div class="pdf-card">
                <h3>🔧 Acțiuni Globale</h3>
                <div class="actions">
                    <button class="btn btn-primary" onclick="refreshData()">
                        🔄 Reîmprospătează Date
                    </button>
                    <button class="btn btn-success" onclick="regenerateAll()">
                        ♻️  Regenerează Toate PDF-urile
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api/menu/pdf';
        
        async function loadStatus() {
            try {
                const response = await fetch(`${API_BASE}/status`);
                const data = await response.json();
                
                // Update stats
                document.getElementById('stat-total').textContent = data.total;
                document.getElementById('stat-cached').textContent = data.cached;
                document.getElementById('stat-size').textContent = data.total_size_mb;
                
                const statusBadge = document.getElementById('stat-status');
                if (data.all_cached) {
                    statusBadge.textContent = 'OK';
                    statusBadge.className = 'status-badge success';
                } else {
                    statusBadge.textContent = 'Parțial';
                    statusBadge.className = 'status-badge warning';
                }
                
                // Render PDFs
                const container = document.getElementById('pdfs-container');
                container.innerHTML = '';
                
                data.pdfs.forEach(pdf => {
                    const card = document.createElement('div');
                    card.className = 'pdf-card';
                    card.innerHTML = `
                        <h3>
                            <span class="icon">${getIcon(pdf.type)}</span>
                            ${pdf.label}
                        </h3>
                        
                        <div class="pdf-info">
                            <div class="row">
                                <span class="label">Status:</span>
                                <span class="value">
                                    <span class="status-badge ${pdf.exists ? 'success' : 'warning'}">
                                        ${pdf.exists ? 'Disponibil' : 'Lipsă'}
                                    </span>
                                </span>
                            </div>
                            ${pdf.exists ? `
                            <div class="row">
                                <span class="label">Dimensiune:</span>
                                <span class="value">${pdf.sizeMB} MB</span>
                            </div>
                            <div class="row">
                                <span class="label">Actualizat:</span>
                                <span class="value">${pdf.modified_formatted}</span>
                            </div>
                            ` : ''}
                        </div>
                        
                        <div class="actions">
                            ${pdf.exists ? `
                            <a href="${API_BASE}/${pdf.type}/${pdf.lang}" 
                               class="btn btn-primary" 
                               target="_blank">
                                👁️ Vizualizează
                            </a>
                            ` : ''}
                            <button class="btn btn-secondary" 
                                    onclick="regenerateSingle('${pdf.type}', '${pdf.lang}')">
                                🔄 Regenerează
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });
                
                // Show content, hide loading
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('error').style.display = 'none';
                
            } catch (error) {
                console.error('Error loading status:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = `Eroare: ${error.message}`;
                document.getElementById('error').style.display = 'block';
            }
        }
        
        function getIcon(type) {
            return type === 'food' ? '🍽️' : '🍹';
        }
        
        async function regenerateAll() {
            if (!confirm('Sigur vrei să regenerezi toate PDF-urile? Poate dura câteva minute.')) {
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Regenerare în curs...';
            
            try {
                const response = await fetch(`${API_BASE}/regenerate`, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Toate PDF-urile au fost regenerate cu succes!');
                    await loadStatus();
                } else {
                    alert(`⚠️  Regenerare parțială: ${data.successful}/${data.total} PDF-uri`);
                    await loadStatus();
                }
            } catch (error) {
                alert(`❌ Eroare: ${error.message}`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '♻️  Regenerează Toate PDF-urile';
            }
        }
        
        async function regenerateSingle(type, lang) {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Regenerare...';
            
            try {
                const response = await fetch(`${API_BASE}/regenerate/${type}/${lang}`, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ PDF regenerat cu succes!');
                    await loadStatus();
                } else {
                    alert(`❌ Eroare: ${data.error}`);
                }
            } catch (error) {
                alert(`❌ Eroare: ${error.message}`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔄 Regenerează';
            }
        }
        
        function refreshData() {
            document.getElementById('content').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            loadStatus();
        }
        
        // Load on page load
        loadStatus();
        
        // Auto-refresh every 30 seconds
        setInterval(loadStatus, 30000);
    </script>
</body>
</html>
