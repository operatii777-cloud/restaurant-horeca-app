<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomenclatoare - Unități & TVA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8f9fa;
            padding: 20px;
        }
        
        .section-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .unit-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-right: 8px;
        }
        
        .category-mass { background: #e3f2fd; color: #1976d2; }
        .category-volume { background: #e8f5e9; color: #388e3c; }
        .category-count { background: #fff3e0; color: #f57c00; }
        .category-horeca { background: #f3e5f5; color: #7b1fa2; }
        
        .vat-rate-card {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid;
        }
        
        .vat-standard { border-color: #1976d2; background: #e3f2fd; }
        .vat-reduced { border-color: #388e3c; background: #e8f5e9; }
        .vat-exempt { border-color: #757575; background: #f5f5f5; }
        .vat-inactive { border-color: #d32f2f; background: #ffebee; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h1 class="mb-4"><i class="fas fa-book me-2"></i>Nomenclatoare</h1>
        
        <!-- UNITĂȚI DE MĂSURĂ -->
        <div class="section-card">
            <h2 class="h4 mb-4"><i class="fas fa-ruler me-2"></i>Unități de Măsură</h2>
            
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nume</th>
                            <th>Simbol</th>
                            <th>Categorie</th>
                            <th>Unitate Bază</th>
                            <th>Factor Conversie</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="unitsTableBody">
                        <tr>
                            <td colspan="7" class="text-center">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                Se încarcă...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- COTE TVA -->
        <div class="section-card">
            <h2 class="h4 mb-4"><i class="fas fa-percent me-2"></i>Cote TVA România</h2>
            
            <div id="vatRatesContainer">
                <div class="text-center">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                    Se încarcă...
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Încarcă unități de măsură
        async function loadUnitsOfMeasure() {
            try {
                const response = await fetch('/api/units-of-measure');
                const data = await response.json();
                
                if (data.success && data.data) {
                    const tbody = document.getElementById('unitsTableBody');
                    tbody.innerHTML = data.data.map(unit => `
                        <tr>
                            <td>${unit.id}</td>
                            <td>${unit.name}</td>
                            <td><strong>${unit.symbol}</strong></td>
                            <td><span class="unit-badge category-${unit.category}">${unit.category}</span></td>
                            <td>${unit.base_unit || '-'}</td>
                            <td>${unit.conversion_factor || 1}</td>
                            <td>
                                ${unit.is_active ? '<span class="badge bg-success">Activ</span>' : '<span class="badge bg-secondary">Inactiv</span>'}
                            </td>
                        </tr>
                    `).join('');
                    
                    console.log(`✅ ${data.data.length} unități încărcate`);
                }
            } catch (error) {
                console.error('❌ Eroare:', error);
                document.getElementById('unitsTableBody').innerHTML = '<tr><td colspan="7" class="text-danger">Eroare la încărcare</td></tr>';
            }
        }
        
        // Încarcă cote TVA
        async function loadVATRates() {
            try {
                const response = await fetch('/api/vat-rates');
                const data = await response.json();
                
                if (data.success && data.data) {
                    const container = document.getElementById('vatRatesContainer');
                    container.innerHTML = data.data.map(rate => {
                        let cssClass = 'vat-standard';
                        if (rate.rate_percentage === 11) cssClass = 'vat-reduced';
                        if (rate.rate_percentage === 0) cssClass = 'vat-exempt';
                        if (!rate.is_active) cssClass = 'vat-inactive';
                        
                        return `
                            <div class="vat-rate-card ${cssClass}">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h5 class="mb-1">${rate.rate_name}</h5>
                                        <p class="mb-0 text-muted small">Cod: ${rate.rate_code}</p>
                                    </div>
                                    <div class="text-end">
                                        <h3 class="mb-0">${rate.rate_percentage}%</h3>
                                        ${rate.is_active 
                                            ? '<span class="badge bg-success">Activ</span>' 
                                            : '<span class="badge bg-danger">Inactiv</span>'}
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    console.log(`✅ ${data.data.length} cote TVA încărcate`);
                }
            } catch (error) {
                console.error('❌ Eroare:', error);
                document.getElementById('vatRatesContainer').innerHTML = '<div class="alert alert-danger">Eroare la încărcare</div>';
            }
        }
        
        // Auto-load la încărcare pagină
        document.addEventListener('DOMContentLoaded', () => {
            loadUnitsOfMeasure();
            loadVATRates();
        });
    </script>
</body>
</html>
