# ═══════════════════════════════════════════════════════════════════════════
# DOCKER COMPOSE - Restaurant App Development
# 
# Pentru development local cu hot-reload
# ═══════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  restaurant-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restaurant-app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - TZ=Europe/Bucharest
    volumes:
      # Mount database pentru persistență
      - ./data:/app/data
      # Mount logs pentru debugging
      - ./logs:/app/logs
      # Mount source pentru hot-reload (development)
      - .:/app
      - /app/node_modules
      - /app/admin-vite/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - restaurant-network

  # Optional: Nginx reverse proxy pentru production
  nginx:
    image: nginx:alpine
    container_name: restaurant-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - restaurant-app
    restart: unless-stopped
    networks:
      - restaurant-network
    profiles:
      - production

networks:
  restaurant-network:
    driver: bridge

volumes:
  restaurant-data:
    driver: local
