name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
    
    - name: Install dependencies
      working-directory: ./server
      run: npm ci
    
    - name: Run backend tests (Jest)
      working-directory: ./server
      run: npm test
      env:
        NODE_ENV: test
        DB_PATH: ./test.db
    
    - name: Install Playwright browsers
      working-directory: ./server
      run: npx playwright install --with-deps chromium
    
    - name: Start server for E2E tests
      working-directory: ./server
      run: |
        npm start &
        sleep 10
      env:
        NODE_ENV: test
        PORT: 3001
    
    - name: Run E2E tests (Playwright)
      working-directory: ./server
      run: npx playwright test
      env:
        BASE_URL: http://localhost:3001
        NODE_ENV: test
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          server/test-results/
          server/coverage/
        retention-days: 7
    
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: server/playwright-report/
        retention-days: 7

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
    
    - name: Install dependencies
      working-directory: ./server
      run: npm ci
    
    - name: Run linter
      working-directory: ./server
      run: npm run lint || true

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
    
    - name: Install dependencies
      working-directory: ./server
      run: npm ci
    
    - name: Build check
      working-directory: ./server
      run: |
        node -e "console.log('Build check passed')"
    
    - name: Create build artifact
      run: |
        mkdir -p dist
        tar -czf dist/restaurant-app-v3.tar.gz server/
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact
        path: dist/restaurant-app-v3.tar.gz
        retention-days: 30

